# TLS cert matrix — one nginx server{} per scenario, distinct port per cert
# so a test picks behavior by connecting to a different port (TESTING_STRATEGY.md §2a).
# Port numbers inside the container; docker-compose maps these to host 14443/14453/…
#
# All five blocks serve the SAME minimal HTTP payload ("ok\n" from /get) so tests can
# distinguish them purely by what happens during the TLS handshake.

# ── valid ─────────────────────────────────────────────────────────────────────
# Signed by harness-root. Listens on the *default* SSL port (443) so SniStrictHostsTest
# can also hit one IP / one port and route by SNI hostname in a later phase.
server {
    listen 443 ssl default_server;
    server_name valid.test localhost;

    ssl_certificate     /etc/nginx/certs/valid.crt;
    ssl_certificate_key /etc/nginx/certs/valid.key;

    location = /get {
        default_type text/plain;
        return 200 "ok\n";
    }
    location / {
        default_type text/plain;
        return 200 "tls-valid\n";
    }
}

# ── self-signed ───────────────────────────────────────────────────────────────
server {
    listen 453 ssl;
    server_name self-signed.test;

    ssl_certificate     /etc/nginx/certs/self-signed.crt;
    ssl_certificate_key /etc/nginx/certs/self-signed.key;

    location / { default_type text/plain; return 200 "tls-self-signed\n"; }
}

# ── expired ───────────────────────────────────────────────────────────────────
server {
    listen 463 ssl;
    server_name expired.test;

    ssl_certificate     /etc/nginx/certs/expired.crt;
    ssl_certificate_key /etc/nginx/certs/expired.key;

    location / { default_type text/plain; return 200 "tls-expired\n"; }
}

# ── wrong-host ────────────────────────────────────────────────────────────────
# Cert SAN is other.test only; clients connecting to 127.0.0.1 see hostname mismatch.
server {
    listen 473 ssl;
    server_name other.test;

    ssl_certificate     /etc/nginx/certs/wrong-host.crt;
    ssl_certificate_key /etc/nginx/certs/wrong-host.key;

    location / { default_type text/plain; return 200 "tls-wrong-host\n"; }
}

# ── untrusted-root ────────────────────────────────────────────────────────────
# Signed by a different CA that no platform trusts.
server {
    listen 483 ssl;
    server_name untrusted-root.test;

    ssl_certificate     /etc/nginx/certs/untrusted-root.crt;
    ssl_certificate_key /etc/nginx/certs/untrusted-root.key;

    location / { default_type text/plain; return 200 "tls-untrusted-root\n"; }
}
