server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;

    # Cross-origin permitted so browser/wasmJs tests can hit this from Karma
    # (different origin than http://localhost:<karma-port>).
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    # GET / — serves index.html (has <html>…</html> so legacy HTTP-shape
    # assertions remain valid on the harness-backed migrations).
    location / {
        index index.html;
    }

    # GET /get — trivial 200 with a plain-text "ok\n" payload. Used by the
    # docker-compose healthcheck and by the harness-availability probe.
    location = /get {
        default_type text/plain;
        return 200 "ok\n";
    }

    # GET /json — minimal JSON response, used by future tlsJsonApi migration.
    location = /json {
        default_type application/json;
        return 200 '{"ok":true}';
    }

    # GET /large — ≥ 8 KB deterministic body (64 lines × 128 chars + newlines
    # = 8256 bytes). Served as a static file from /usr/share/nginx/html/large
    # because nginx's `return 200 "..."` directive has a single-parameter
    # length limit (~4 KB) that the 8 KB payload busts. The file is committed
    # at test-harness/http/www/large; the TLS vhost mounts the same www dir
    # so it can serve /large too.
    location = /large {
        default_type text/plain;
        alias /usr/share/nginx/html/large;
    }
}
