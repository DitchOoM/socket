name: socket-test-harness

# Phase 1 stack: plain TCP echo + HTTP/1.1.
# Each service is bound to 127.0.0.1 only — never exposed beyond localhost.
# Ports are pinned (no dynamic mapping) so JVM/K/N see identical numbers.

networks:
  socketnet:
    driver: bridge

services:
  # L0 — plain TCP echo (socat EXEC:cat). Used by clientEcho/serverEcho-style
  # tests and as the cheapest harness-availability probe.
  echo:
    build: ./echo
    networks: [socketnet]
    ports:
      - "127.0.0.1:14000:14000"
    healthcheck:
      # 127.0.0.1, not "localhost": docker's embedded DNS returns IPv6 (::1)
      # first; socat would try ::1:14000 and get "connection refused" because
      # socat-LISTEN binds IPv4 only by default.
      test: ["CMD-SHELL", "echo PING | socat -T 2 - TCP:127.0.0.1:14000 | grep -q PING"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 1s
    restart: unless-stopped

  # L0 — HTTP/1.1. Static content under ./http/www; per-route returns under
  # ./http/conf.d/default.conf. CORS-permissive so browser/wasmJs WebSocket-
  # shape tests can reach it cross-origin.
  http:
    image: nginx:1.27-alpine
    networks: [socketnet]
    volumes:
      - ./http/conf.d:/etc/nginx/conf.d:ro
      - ./http/www:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:14080:80"
    healthcheck:
      # 127.0.0.1, not "localhost": see the echo service above — nginx's
      # default `listen 80;` is IPv4 only, and "localhost" resolves to ::1.
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/get | grep -q ok"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 1s
    restart: unless-stopped

  # L6 — TLS cert matrix. One container, five server{} blocks on five ports
  # (TESTING_STRATEGY.md §2a / §2b). Cert files come from ./tls/certs/, which
  # is generated by ./tls/gen-certs.sh (committed script, certs gitignored).
  tls:
    image: nginx:1.27-alpine
    networks:
      socketnet:
        aliases:
          # SNI test needs distinct hostnames on the same IP; reserved for a
          # later phase that exercises `SniStrictHostsTest` against the harness.
          - valid.test
          - self-signed.test
          - expired.test
          - other.test
          - untrusted-root.test
    volumes:
      - ./tls/conf.d:/etc/nginx/conf.d:ro
      - ./tls/certs:/etc/nginx/certs:ro
    ports:
      - "127.0.0.1:14443:443"   # valid (signed by harness-root)
      - "127.0.0.1:14453:453"   # self-signed
      - "127.0.0.1:14463:463"   # expired (backdated cert)
      - "127.0.0.1:14473:473"   # wrong-host (SAN doesn't match 127.0.0.1)
      - "127.0.0.1:14483:483"   # untrusted-root (signed by a different CA)
    healthcheck:
      # Just verify nginx is listening on the valid-TLS port — `nc -z` is a
      # plain TCP port-open probe (busybox nc, bundled in nginx:alpine). The
      # actual TLS handshake/validation behavior is what the *tests* assert.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 443 && nc -z 127.0.0.1 453 && nc -z 127.0.0.1 463 && nc -z 127.0.0.1 473 && nc -z 127.0.0.1 483"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 1s
    restart: unless-stopped

  # L4 — toxiproxy. Sits between the test process and {echo, http, tls:valid}
  # so Phase-3 tests can inject `down`/`reset_peer`/`slicer` toxics for the
  # deterministic broken-pipe / partial-read regressions
  # (TESTING_STRATEGY.md §2d, HANDOFF.md Phase 3).
  #
  # The image is distroless — no shell, no `nc`, no `wget`. The only binaries
  # are `/toxiproxy-server` (the default entrypoint) and `/toxiproxy-cli`.
  # `toxiproxy-cli list` hits the local control API on 127.0.0.1:8474 and
  # exits 0 iff it succeeds, which is exactly the healthcheck signal we want.
  #
  # Proxies are NOT pre-configured here — test classes POST them at setup
  # via the Toxiproxy helper in commonJvmTest, so each test run gets a fresh,
  # isolated proxy table.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    networks: [socketnet]
    depends_on:
      echo:
        condition: service_healthy
      http:
        condition: service_healthy
      tls:
        condition: service_healthy
    ports:
      - "127.0.0.1:8474:8474"     # control API
      - "127.0.0.1:15000:15000"   # proxy → echo:14000
      - "127.0.0.1:15080:15080"   # proxy → http:80
      - "127.0.0.1:15443:15443"   # proxy → tls:443 (valid-cert vhost)
    healthcheck:
      # Distroless image — no shell, so use the exec form of CMD with
      # toxiproxy-cli (which calls the local 8474 API and exits non-zero
      # if it can't reach the server). Equivalent to `nc -z 127.0.0.1 8474`
      # but using what's actually in the image.
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 1s
    restart: unless-stopped
