name: socket-test-harness

# Phase 1 stack: plain TCP echo + HTTP/1.1.
# Each service is bound to 127.0.0.1 only — never exposed beyond localhost.
# Ports are pinned (no dynamic mapping) so JVM/K/N see identical numbers.

networks:
  socketnet:
    driver: bridge
    # Pinned subnet so the netem-blackhole service can be reached at a stable
    # IPv4 address from the host. docker-proxy on 127.0.0.1 completes the
    # client's connect handshake locally and would defeat the "SYN never
    # acknowledged" semantics; connecting to the bridge IP directly skips
    # docker-proxy and surfaces the real connect-timeout.
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  # L0 — plain TCP echo (socat EXEC:cat). Used by clientEcho/serverEcho-style
  # tests and as the cheapest harness-availability probe.
  echo:
    build: ./echo
    networks: [socketnet]
    ports:
      - "127.0.0.1:14000:14000"
    healthcheck:
      # 127.0.0.1, not "localhost": docker's embedded DNS returns IPv6 (::1)
      # first; socat would try ::1:14000 and get "connection refused" because
      # socat-LISTEN binds IPv4 only by default.
      test: ["CMD-SHELL", "echo PING | socat -T 2 - TCP:127.0.0.1:14000 | grep -q PING"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 1s
    restart: unless-stopped

  # L0 — HTTP/1.1. Static content under ./http/www; per-route returns under
  # ./http/conf.d/default.conf. CORS-permissive so browser/wasmJs WebSocket-
  # shape tests can reach it cross-origin.
  http:
    image: nginx:1.27-alpine
    networks: [socketnet]
    volumes:
      - ./http/conf.d:/etc/nginx/conf.d:ro
      - ./http/www:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:14080:80"
    healthcheck:
      # 127.0.0.1, not "localhost": see the echo service above — nginx's
      # default `listen 80;` is IPv4 only, and "localhost" resolves to ::1.
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/get | grep -q ok"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 1s
    restart: unless-stopped

  # L6 — TLS cert matrix. One container, five server{} blocks on five ports
  # (TESTING_STRATEGY.md §2a / §2b). Cert files come from ./tls/certs/, which
  # is generated by ./tls/gen-certs.sh (committed script, certs gitignored).
  tls:
    image: nginx:1.27-alpine
    networks:
      socketnet:
        aliases:
          # SNI test needs distinct hostnames on the same IP; reserved for a
          # later phase that exercises `SniStrictHostsTest` against the harness.
          - valid.test
          - self-signed.test
          - expired.test
          - other.test
          - untrusted-root.test
    volumes:
      - ./tls/conf.d:/etc/nginx/conf.d:ro
      - ./tls/certs:/etc/nginx/certs:ro
      # Share the http vhost's www dir for `/large` static body. nginx's
      # `return 200 "..."` directive has a length limit (~4 KB for a single
      # parameter) which the ≥ 8 KB /large body busts, so we serve the
      # response from a static file instead.
      - ./http/www:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:14443:443"   # valid (signed by harness-root)
      - "127.0.0.1:14453:453"   # self-signed
      - "127.0.0.1:14463:463"   # expired (backdated cert)
      - "127.0.0.1:14473:473"   # wrong-host (SAN doesn't match 127.0.0.1)
      - "127.0.0.1:14483:483"   # untrusted-root (signed by a different CA)
      - "127.0.0.1:14493:493"   # valid cert, TLS 1.3-only (no 1.2 fallback)
    healthcheck:
      # Just verify nginx is listening on the valid-TLS port — `nc -z` is a
      # plain TCP port-open probe (busybox nc, bundled in nginx:alpine). The
      # actual TLS handshake/validation behavior is what the *tests* assert.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 443 && nc -z 127.0.0.1 453 && nc -z 127.0.0.1 463 && nc -z 127.0.0.1 473 && nc -z 127.0.0.1 483 && nc -z 127.0.0.1 493"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 1s
    restart: unless-stopped

  # L3 — netem blackhole. Replaces the magic `10.255.255.1` non-routable IP in
  # connect-timeout tests with a deterministic, harness-local endpoint. The
  # container has socat listening on 14999, and `tc qdisc add ... root netem
  # loss 100%` on eth0 drops *all* outbound packets so the SYN-ACK never
  # reaches the client. Inbound is untouched by an egress qdisc, which is
  # exactly the asymmetry we need: SYN arrives, SYN-ACK vanishes.
  #
  # ── Host-binding note ────────────────────────────────────────────────────
  # We do *not* publish a 127.0.0.1 port for this service because docker-proxy
  # completes the host-side accept locally before forwarding to the container
  # (verified empirically: the client's `connect()` returns success in <1 ms,
  # then `recv()` times out). Tests must connect to the pinned bridge IP
  # (`172.30.0.99:14999`) instead — the host has a kernel route to the bridge
  # subnet, so SYNs traverse br-* directly, hit the container's eth0 (no
  # docker-proxy), the netem qdisc drops the SYN-ACK on the way out, and the
  # client's connect-timeout fires.
  #
  # NET_ADMIN is required for `tc qdisc add`. Alpine 3.20 + iproute2 + socat
  # is ~10 MB; busybox `nc` doesn't `fork` reliably, which is why socat is the
  # listener.
  netem-blackhole:
    image: alpine:3.20
    networks:
      socketnet:
        # Pinned so HarnessConfig.netemBlackholeHost can be a constant. Any
        # IP in the 172.30.0.0/24 subnet above works; .99 is well away from
        # the gateway/auto-assigned range to avoid collisions.
        ipv4_address: 172.30.0.99
    cap_add:
      - NET_ADMIN
    # `sh -c` so the egress drop is installed *before* socat starts accepting.
    # Without that ordering, a fast-enough client SYN+SYN-ACK could complete
    # the handshake before the qdisc lands and the test would observe a
    # successful connect instead of a timeout.
    command:
      - sh
      - -c
      - |
        set -eu
        apk add --no-cache iproute2 socat >/dev/null
        tc qdisc add dev eth0 root netem loss 100%
        exec socat -d TCP-LISTEN:14999,reuseaddr,fork EXEC:/bin/true
    healthcheck:
      # Egress is dropped, so any TCP/HTTP probe times out — `nc -z` would
      # hang. Verify the listener process is alive instead.
      test: ["CMD-SHELL", "pgrep socat >/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
    restart: unless-stopped

  # L4 — toxiproxy. Sits between the test process and {echo, http, tls:valid}
  # so Phase-3 tests can inject `down`/`reset_peer`/`slicer` toxics for the
  # deterministic broken-pipe / partial-read regressions
  # (TESTING_STRATEGY.md §2d, HANDOFF.md Phase 3).
  #
  # The image is distroless — no shell, no `nc`, no `wget`. The only binaries
  # are `/toxiproxy-server` (the default entrypoint) and `/toxiproxy-cli`.
  # `toxiproxy-cli list` hits the local control API on 127.0.0.1:8474 and
  # exits 0 iff it succeeds, which is exactly the healthcheck signal we want.
  #
  # Proxies are NOT pre-configured here — test classes POST them at setup
  # via the Toxiproxy helper in commonJvmTest, so each test run gets a fresh,
  # isolated proxy table.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    networks: [socketnet]
    depends_on:
      echo:
        condition: service_healthy
      http:
        condition: service_healthy
      tls:
        condition: service_healthy
    ports:
      - "127.0.0.1:8474:8474"     # control API
      - "127.0.0.1:15000:15000"   # proxy → echo:14000
      - "127.0.0.1:15080:15080"   # proxy → http:80
      - "127.0.0.1:15443:15443"   # proxy → tls:443 (valid-cert vhost)
    healthcheck:
      # Distroless image — no shell, so use the exec form of CMD with
      # toxiproxy-cli (which calls the local 8474 API and exits non-zero
      # if it can't reach the server). Equivalent to `nc -z 127.0.0.1 8474`
      # but using what's actually in the image.
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 1s
    restart: unless-stopped

  # L4 — Deterministic TCP RST sidecar. Replaces toxiproxy's `reset_peer`
  # toxic on the read-path peer-reset test. `reset_peer` is implemented as
  # SO_LINGER=0 + close() on the *proxy* side, but the FIN/RST ordering on
  # the *client* side is kernel-scheduling-dependent — on busy GH
  # ubuntu-24.04 runners a parked read often observes EOF before the RST
  # arrives, flaking the assertion. This sidecar takes toxiproxy out of the
  # path: a tiny Python listener calls setsockopt(SO_LINGER, on=1, linger=0)
  # then close() in that exact order, which puts a real TCP RST on the wire
  # (no FIN) on every kernel. See ./rst/rst_server.py for the why.
  #
  # The single-byte trigger lets the test control timing precisely: park a
  # read(), then write one byte to arm the RST. See ExceptionConformanceTests
  # `pendingReadDuringPeerReset_producesSocketClosedException` for the
  # consumer.
  #
  # ── Host-binding note (same gotcha as netem-blackhole) ──────────────────
  # We do *not* publish a 127.0.0.1 port for this service: docker-proxy on
  # the loopback publish terminates two separate TCP connections back-to-
  # back and converts the upstream's RST into a graceful FIN on the host
  # side (verified empirically — the client sees EndOfStream, not
  # ConnectionReset). Tests must connect to the pinned bridge IP
  # (`172.30.0.98:14998`) directly so the SYN traverses the docker bridge,
  # hits the container's eth0 with no userland-proxy in the middle, and the
  # kernel-generated RST reaches the client unmodified.
  rst:
    build: ./rst
    networks:
      socketnet:
        # Pinned so HarnessConfig.rstHost can be a constant. .98 is well
        # away from the gateway and from netem-blackhole's .99 to avoid
        # collisions.
        ipv4_address: 172.30.0.98
    healthcheck:
      # python3 is already in the image; using it for the healthcheck
      # avoids pulling in netcat/socat just for the probe.
      test:
        - "CMD-SHELL"
        - "python3 -c 'import socket,sys;s=socket.socket();s.settimeout(2);s.connect((\"127.0.0.1\",14998));s.close()' || exit 1"
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 2s
    restart: unless-stopped

  # L7 — QUIC echo server. JVM-based, wraps QuicEchoTestServer from
  # socket-quic test sources (built by :socket-quic:quicEchoJar, which is
  # a dependsOn of harnessUp). UDP only; replaces cloudflare-quic.com in
  # QuicIntegrationTests via QuicHarnessIntegrationTests.
  #
  # Healthcheck: `pgrep -x java` — proves the JVM is alive. A UDP-level
  # probe (`nc -uz`) is unreliable here because QUIC won't respond to a
  # bare UDP datagram; only a complete client hello triggers a packet
  # back. The test itself is the actual probe (the QUIC client either
  # connects or the test skips/fails); pgrep just stops Docker from
  # restarting the container while it's healthy.
  quic-echo:
    build: ./quic-echo
    networks: [socketnet]
    ports:
      - "127.0.0.1:14433:14433/udp"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x java >/dev/null"]
      interval: 2s
      timeout: 3s
      retries: 30        # JVM cold-start + quiche JNI extract is slow
      start_period: 5s
    restart: unless-stopped
