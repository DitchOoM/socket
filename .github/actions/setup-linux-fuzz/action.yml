name: "Setup Linux fuzz/native toolchain"
description: >-
  JDK 21 + the warm build caches `build` saved (gradle build-cache, BoringSSL,
  quiche, cargo) + the BoringSSL/quiche/aarch64 build toolchain, and — for the
  native ASAN lanes — nightly Rust + cargo-fuzz. Shared by the split malloc-check
  + fuzz jobs (#209 → parallel fan-out) so they don't each duplicate ~90 lines of
  setup. Assumes the repo is already checked out (hashFiles + the composite's own
  file both need the working tree). The caller job must `needs: build` so these
  caches are populated before restore.
inputs:
  cargo-fuzz:
    description: "Install nightly Rust + cargo-fuzz for the native (cargo-fuzz ASAN) lanes."
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: gradle

    # Same cache keys as `build` — it (the caller's `needs:`) finishes and saves these
    # before this job starts, so we restore them warm: the malloc-check jvmTest rerun, the
    # Jazzer lane's prepareQuicheNativeLib, and the cargo-fuzz quiche compile reuse the
    # already-built klibs / BoringSSL / quiche / cargo target/ trees, not a cold rebuild.
    - name: Cache Gradle build outputs
      uses: actions/cache@v5
      with:
        path: ~/.gradle/caches
        key: gradle-linux-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-linux-

    - name: Cache BoringSSL x64
      uses: actions/cache@v5
      with:
        path: libs/boringssl/linux-x64
        key: boringssl-linux-x64-v4-${{ hashFiles('gradle/libs.versions.toml') }}

    # The JVM lanes (malloc-check jvmTest + Jazzer quicHeaderFuzz) pull the host JNI-shim
    # build, whose Gradle graph also reaches the root :buildBoringsslArm64 + the arm64
    # quiche/shim tasks (the multi-arch native staging wiring). Restore the SAME arm64
    # caches `build` saved so those tasks are UP-TO-DATE and skip — exactly as the x64
    # cache makes the x64 chain skip. Without these the arm64 BoringSSL cmake runs and
    # dies for lack of an aarch64 cross-compiler.
    - name: Cache BoringSSL ARM64
      uses: actions/cache@v5
      with:
        path: libs/boringssl/linux-arm64
        key: boringssl-linux-arm64-v4-${{ hashFiles('gradle/libs.versions.toml') }}

    - name: Cache quiche Linux x64
      uses: actions/cache@v5
      with:
        path: socket-quic-quiche/libs/quiche/linux-x64
        key: quiche-linux-x64-v7-${{ hashFiles('gradle/libs.versions.toml', 'socket-quic-quiche/src/jni/quiche_jni.c') }}

    - name: Cache quiche Linux ARM64
      uses: actions/cache@v5
      with:
        path: socket-quic-quiche/libs/quiche/linux-arm64
        key: quiche-linux-arm64-v7-${{ hashFiles('gradle/libs.versions.toml', 'socket-quic-quiche/src/jni/quiche_jni.c') }}

    - name: Cache quiche cargo target/ (all triples)
      uses: actions/cache@v5
      with:
        path: socket-quic-quiche/build/quiche
        key: quiche-cargo-target-v2-${{ hashFiles('gradle/libs.versions.toml', 'socket-quic-quiche/src/jni/quiche_jni.c') }}
        restore-keys: quiche-cargo-target-v2-

    - name: Cache Cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: cargo-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
        restore-keys: cargo-${{ runner.os }}-

    # Host build deps + aarch64 cross-compiler: REQUIRED, not optional. Even a "pure-JVM"
    # Jazzer lane (e.g. :socket-http3:http3CodecFuzz) has a task graph that transitively
    # reaches :buildBoringsslX64/:buildBoringsslArm64 + the quiche/cinterop chain through
    # the KMP metadata dependency (socket-http3 → socket-quic → socket-quic-quiche). On a
    # warm cache those are up-to-date and skip, but on ANY cache miss (esp. the arm64
    # BoringSSL) they run cmake and die without this toolchain — which is exactly what an
    # earlier "skip the toolchain for http3 lanes" optimization broke. libclang: the
    # cargo-fuzz native lanes compile quiche 0.29 (boring-crate default), whose boring-sys
    # build runs bindgen.
    - name: Install build toolchain (BoringSSL/quiche, incl. aarch64 cross)
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential perl pkg-config cmake nasm
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        sudo apt-get install -y libclang-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    # arm64 Rust target so a cache-miss arm64 quiche build can cross-compile.
    - name: Add Rust aarch64 target
      shell: bash
      run: rustup target add aarch64-unknown-linux-gnu

    # cargo-fuzz's compiled binary is NOT in the Cargo registry cache (that caches crate
    # sources, not the built binary), so cache it directly keyed on a manual version — an
    # eviction just recompiles. This turns the ~3-5 min `cargo install cargo-fuzz` into a
    # near-instant restore across runs, which is what makes fanning the native ASAN lanes
    # out into separate parallel jobs cheap instead of paying that compile per job.
    - name: Cache cargo-fuzz binary
      if: inputs.cargo-fuzz == 'true'
      uses: actions/cache@v5
      with:
        path: ~/.cargo/bin/cargo-fuzz
        key: cargo-fuzz-bin-${{ runner.os }}-v1

    - name: Install nightly Rust + cargo-fuzz
      if: inputs.cargo-fuzz == 'true'
      shell: bash
      run: |
        rustup toolchain install nightly --profile minimal
        # Skip the (slow) compile when the cache above restored the binary.
        command -v cargo-fuzz >/dev/null 2>&1 || cargo install cargo-fuzz --locked
