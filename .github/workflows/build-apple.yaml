name: "Build & Test (Apple)"

on:
  workflow_call:
    inputs:
      gradle-args:
        description: "Extra Gradle arguments (e.g., -PincrementMinor=true)"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "Computed next version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: "Apple Targets"
    runs-on: macos-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-macos-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-macos-

      - name: Get version
        id: version
        run: echo "version=$(./gradlew -q nextVersion ${{ inputs.gradle-args }})" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Combined quiche + JNI shim cache — shims now live under
      # socket-quic/libs/quiche/<platform>/lib/ alongside libquiche.dylib,
      # matching the local-dev path so Gradle's classifier-JAR pipeline picks
      # them up from the same place. Hash quiche_jni.c so shim edits invalidate.
      - name: Cache quiche macOS
        uses: actions/cache@v4
        with:
          path: |
            socket-quic/libs/quiche/macos-x64
            socket-quic/libs/quiche/macos-arm64
          key: quiche-macos-v3-${{ hashFiles('gradle/libs.versions.toml', 'socket-quic/src/jni/quiche_jni.c') }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build quiche + JNI shim for macOS
        continue-on-error: true
        run: |
          set -x
          # Write into libs/quiche/<platform>/lib/ so local-dev + CI share paths
          # and the Gradle classifier-JAR pipeline (jvmNativesJar*) picks up.
          QUICHE_LIBS="socket-quic/libs/quiche"

          # Clone quiche once, build for both architectures
          git clone --recursive --depth 1 --branch 0.28.0 \
            https://github.com/cloudflare/quiche.git /tmp/quiche-src

          # Add the cross-compile target (ARM64 runner needs x64 target and vice versa)
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

          for pair in "aarch64-apple-darwin macos-arm64" "x86_64-apple-darwin macos-x64"; do
            RUST_TARGET="${pair%% *}"
            PLATFORM="${pair##* }"
            DEST="$QUICHE_LIBS/$PLATFORM/lib"

            cd /tmp/quiche-src
            cargo build --release --package quiche --target $RUST_TARGET \
              --no-default-features --features ffi,boringssl-vendored
            cd ${{ github.workspace }}

            QUICHE_DYLIB="/tmp/quiche-src/target/$RUST_TARGET/release/libquiche.dylib"
            if [ -f "$QUICHE_DYLIB" ]; then
              mkdir -p $DEST
              cp "$QUICHE_DYLIB" "$DEST/libquiche.dylib"
              strip -x "$DEST/libquiche.dylib"
              # Build thin JNI shim that links to quiche dynamically
              # (static linking Rust .a into C .so breaks Rust runtime init → panic)
              cc -shared -fPIC -Wall \
                -o $DEST/libquiche_jni.dylib \
                socket-quic/src/jni/quiche_jni.c \
                -I${JAVA_HOME}/include -I${JAVA_HOME}/include/darwin \
                -I socket-quic/libs/quiche/include \
                -L$DEST -lquiche \
                -Wl,-rpath,@loader_path \
                -target $(echo $RUST_TARGET | sed 's/aarch64/arm64/;s/x86_64/x86_64/') \
                && strip -x $DEST/libquiche_jni.dylib \
                && echo "Built $DEST/libquiche_jni.dylib ($(du -h $DEST/libquiche_jni.dylib | cut -f1))" \
                && echo "With $DEST/libquiche.dylib ($(du -h $DEST/libquiche.dylib | cut -f1))"
            else
              echo "WARN: libquiche.dylib not found at $QUICHE_DYLIB"
            fi
          done

      - name: Verify macOS JNI shims exist
        run: |
          find socket-quic/libs/quiche/macos-*/lib -name "libquiche_jni.dylib" -o -name "libquiche.dylib" 2>/dev/null || echo "WARN: no macOS JNI shims"

      # macOS harness — disabled. Three fixture paths attempted on macos-latest;
      # all failed (HANDOFF.md Q1 + TODO.md):
      #   Path A (native homebrew socat + nginx)
      #       → Apple Network.framework throws SSLProtocolException on every
      #         TLS handshake against native nginx (12 tests).
      #   Path B (Apple `container` CLI, 0.12.3)
      #       → CLI surface incomplete: no `system start` subcommand
      #         (exit 64 = usage error).
      #   Path C (Colima with --vm-type=qemu)
      #       → lima host agent crashes on macos-latest's image
      #         ("host agent process has exited: exit status 2").
      #
      # HARNESS_DISABLED=true tells the Gradle harness lifecycle to no-op (see
      # runHarnessCmd in build.gradle.kts), and isHarnessAvailable() returns
      # false at runtime so every harness-backed test (TlsConformanceTests,
      # ExceptionConformanceTests, etc.) skips cleanly via the existing guard.
      # Apple K/N target unit tests, ktlint, and socket-quic:jvmTest still run
      # — they don't depend on the harness. Cross-platform contracts are still
      # validated on build-linux's JVM/K-Native/jsNode runs.
      - name: Disable harness on macOS (no working Docker fixture)
        run: echo "HARNESS_DISABLED=true" >> $GITHUB_ENV

      # :socket-quic:jvmTest is excluded on macOS for the same reason it's
      # excluded on Windows and isolated as continue-on-error on Linux: the
      # quiche-0.28 native panic from `quiche_conn_recv`
      # (quiche/src/ffi.rs:2059:14). On Linux it SIGABRTs cleanly; on macOS
      # it deadlocks the JVM, which exhausts the job's 60-min timeout
      # without producing a useful failure mode. Tracked in TODO.md as the
      # \"socket-quic:jvmTest quiche-0.28 panic\" item; same path forward
      # for both platforms.
      - name: Run Apple tests
        run: >-
          ./gradlew :macosX64Test :macosArm64Test :iosSimulatorArm64Test
          :tvosSimulatorArm64Test :watchosSimulatorArm64Test :ktlintCheck
          :socket-quic:jvmProcessResources
          --no-configuration-cache ${{ inputs.gradle-args }}

      - name: Run socket-quic Apple native tests (Network.framework)
        continue-on-error: true
        run: >-
          ./gradlew :socket-quic:macosArm64Test :socket-quic:iosSimulatorArm64Test
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Test reports on failure — see build-linux.yaml for the why.
      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-apple
          path: |
            build/reports/tests/
            build/test-results/
            build/reports/ktlint/
            socket-quic/build/reports/tests/
            socket-quic/build/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload macOS quiche native libs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quiche-macos-natives
          path: socket-quic/libs/quiche/macos-*/lib/
          retention-days: 1
          if-no-files-found: ignore

      - name: Publish Apple targets to Maven Local
        run: >-
          ./gradlew --no-configuration-cache ${{ inputs.gradle-args }}
          publishKotlinMultiplatformPublicationToMavenLocal
          publishIosArm64PublicationToMavenLocal
          publishIosSimulatorArm64PublicationToMavenLocal
          publishIosX64PublicationToMavenLocal
          publishMacosArm64PublicationToMavenLocal
          publishMacosX64PublicationToMavenLocal
          publishTvosArm64PublicationToMavenLocal
          publishTvosSimulatorArm64PublicationToMavenLocal
          publishTvosX64PublicationToMavenLocal
          publishWatchosArm64PublicationToMavenLocal
          publishWatchosSimulatorArm64PublicationToMavenLocal
          publishWatchosX64PublicationToMavenLocal

      - name: Upload Maven local artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-local-apple
          path: ~/.m2/repository/com/ditchoom
          retention-days: 3
