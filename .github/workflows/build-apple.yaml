name: "Build & Test (Apple)"

on:
  workflow_call:
    inputs:
      gradle-args:
        description: "Extra Gradle arguments (e.g., -PincrementMinor=true)"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "Computed next version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: "Apple Targets"
    # The Apple QUIC backend is now Cloudflare quiche over an NWConnection-UDP datapath (the
    # quiche-on-Apple pivot replaced the Network.framework system-QUIC backend / the deleted
    # :socket-quic-nw, which deleted the macos-26 libquic teardown UAF). quiche needs no special SDK;
    # macos-26 is kept for a recent Xcode + an iOS-26 simulator runtime for iosSimulatorArm64Test.
    runs-on: macos-26
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: konan-macos-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-macos-

      # Persist the local Gradle build cache (~/.gradle/caches/build-cache-1) across runs so the
      # compiled native klibs, cinterop klibs, and per-target native shim archives are reused
      # instead of rebuilt cold every run. setup-java's `cache: gradle` only restores the
      # dependency caches (modules-2), NOT build-cache-1, so without this every PR recompiles all
      # klibs even though org.gradle.caching=true. Keyed on the build definition (version catalog,
      # build scripts, wrapper); restore-keys fall back to the most recent partial match. (mirrors buffer #232)
      - name: Cache Gradle build outputs
        uses: actions/cache@v6
        with:
          path: ~/.gradle/caches
          key: gradle-macos-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-macos-

      - name: Get version
        id: version
        run: echo "version=$(./gradlew -q nextVersion ${{ inputs.gradle-args }})" >> $GITHUB_OUTPUT

      # All five Apple Rust targets the quiche static libs are built for (macOS x2 + iOS device/sim-arm64/
      # sim-x64). Pre-installing them here means the Gradle build step doesn't have to.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # All built quiche native libs for every Apple target: the macOS dylib + JNI shim (for the JVM
      # JNI/FFM tests) and the macOS + iOS static libs the K/N test binaries -force_load. The expensive
      # part is the from-source cargo + vendored-BoringSSL build for five targets (~10-20 min), so cache
      # it keyed on the quiche version + the JNI-shim source. A near-version restore-key seeds the cache;
      # the Gradle tasks' .built-<ver> markers correctly force a rebuild on a version bump.
      - name: Cache quiche Apple native libs
        uses: actions/cache@v6
        with:
          path: |
            socket-quic-quiche/libs/quiche/macos-arm64/lib
            socket-quic-quiche/libs/quiche/macos-x64/lib
            socket-quic-quiche/libs/quiche/ios-arm64/lib
            socket-quic-quiche/libs/quiche/ios-simulator-arm64/lib
            socket-quic-quiche/libs/quiche/ios-x64/lib
          key: quiche-apple-v1-${{ hashFiles('gradle/libs.versions.toml', 'socket-quic-quiche/src/jni/quiche_jni.c') }}
          restore-keys: quiche-apple-v1-

      # Build every Apple quiche native lib. buildQuicheAppleStaticLibs makes the macOS dylib+.a (both
      # arches) + the three iOS static libs (vendored BoringSSL, build.rs patched for the arm64 iOS
      # simulator); prepareQuicheNativeLib makes the host-arch JNI shim for the JVM tests. Both skip cargo
      # on a marker/cache hit.
      - name: Build quiche Apple native libs
        run: >-
          ./gradlew
          :socket-quic-quiche:buildQuicheAppleStaticLibs
          :socket-quic-quiche:prepareQuicheNativeLib
          --no-configuration-cache ${{ inputs.gradle-args }}

      # HARD check — the K/N link gates -force_load on each libquiche.a existing at configuration time, so
      # a build failure above would otherwise surface only as a confusing unresolved-symbol link error.
      - name: Verify Apple quiche static libs exist
        run: |
          set -euo pipefail
          missing=0
          for d in macos-arm64 macos-x64 ios-arm64 ios-simulator-arm64 ios-x64; do
            f="socket-quic-quiche/libs/quiche/$d/lib/libquiche.a"
            if [ ! -f "$f" ]; then echo "::error::missing $f"; missing=1; else echo "ok: $f"; fi
          done
          [ "$missing" = 0 ] || { echo "::error::quiche Apple static libs missing — the build step failed."; exit 1; }

      # The Docker-backed conformance harness has no working macOS fixture (HANDOFF.md Q1); the env var
      # makes every harness-backed test self-skip cleanly. Apple K/N unit tests, the quiche loopback +
      # H3 + WebTransport suites, ktlint, and the JVM quiche tests don't need it.
      - name: Disable harness on macOS (no working Docker fixture)
        run: echo "HARNESS_DISABLED=true" >> $GITHUB_ENV

      # Apple K/N tests across EVERY module. The task names are UNQUALIFIED (no leading colon) so Gradle
      # runs them in every subproject that has them — a leading-colon `:macosX64Test` would run only the
      # ROOT project's test and silently skip socket-quic-quiche / socket-http3 / socket-webtransport (a
      # false green). The full QUIC suites on quiche are:
      #   - socket-quic-quiche AppleQuicheEngineLoopbackTest (quiche client over NW-UDP <-> dual-stack
      #     IPv6 POSIX server)
      #   - socket-http3 AppleHttp3LoopbackTest (the HTTP/3 stack — was the flaky macos-26 NW-loopback CI
      #     red, now green on quiche)
      #   - socket-webtransport AppleWebTransportTest (the WebTransport server stack)
      # macosArm64Test is NOT run here — it moved to the integration-macos-arm64 job, which runs the
      # prebuilt .kexe standalone (linked + uploaded below). macOS x64 still runs the full suites inline.
      # iosSimulatorArm64Test runs the quiche loopback for real (POSIX/NW datapath needs no
      # Network.framework listener, so it works standalone); the H3/WebTransport suites self-skip on the
      # standalone sim (no testcerts/ cwd). tvOS/watchOS have no quiche target → UnsupportedQuicEngine, so
      # their QUIC suites skip cleanly. NOT continue-on-error: a real Apple test failure must stay red.
      - name: Run Apple K/N tests (quiche)
        run: >-
          ./gradlew
          macosX64Test iosSimulatorArm64Test
          tvosSimulatorArm64Test watchosSimulatorArm64Test
          ktlintCheck
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Link (don't run) the macosArm64 test binaries for the integration-macos-arm64 job. UNQUALIFIED so
      # every module with a macosArm64 test target is linked — socket-quic-quiche / socket-http3 /
      # socket-webtransport carry the real Apple QUIC/H3/WebTransport loopback suites. The K/N link
      # -force_loads each libquiche.a, so the .kexe is self-contained: the integration job runs it with
      # only a checkout (for the committed <module>/testcerts/), no quiche libs or Docker harness.
      - name: Link macosArm64 test binaries for integration job
        run: >-
          ./gradlew linkDebugTestMacosArm64
          --no-configuration-cache ${{ inputs.gradle-args }}

      - name: Upload macosArm64 test binaries
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-test-binaries
          # Glob across modules; upload-artifact strips the common ancestor (repo root, since the root
          # module's path has no module prefix), so each file keeps its <module>/build/bin/... path and
          # restores there on download — exactly where it must sit to find <module>/testcerts/.
          path: '**/build/bin/macosArm64/debugTest/test.kexe'
          retention-days: 1
          if-no-files-found: error

      # :socket-quic-quiche on the JVM — the only place FFM-on-macOS and the IS_BSD sockaddr decode run.
      # QUIC_MIGRATION_REQUIRE_RUN=1 turns a clean skip of the active-migration test into a hard failure so
      # a broken native can't pass as green.
      - name: Run socket-quic-quiche JVM tests (JNI)
        timeout-minutes: 8
        env:
          QUIC_MIGRATION_REQUIRE_RUN: "1"
        run: >-
          ./gradlew :socket-quic-quiche:jvmTest --continue
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Same suite on the FFM backend (-PquicheJvmBackend=ffm prepends the java21/Panama loader). `if:
      # !cancelled()` so FFM runs even if the JNI step crashed — the two backends are independent.
      - name: Run socket-quic-quiche JVM tests (FFM backend)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        env:
          QUIC_MIGRATION_REQUIRE_RUN: "1"
        run: >-
          ./gradlew :socket-quic-quiche:jvmTest -PquicheJvmBackend=ffm --continue
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Test reports on failure — includes the JVM hs_err/replay crash logs: a native abort (quiche/JNI/
      # FFM SIGABRT/SIGSEGV) shows only as "exit value 134" with no failing JUnit case otherwise.
      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-apple
          path: |
            build/reports/tests/
            build/test-results/
            build/reports/ktlint/
            socket-quic-quiche/build/reports/tests/
            socket-quic-quiche/build/test-results/
            socket-http3/build/reports/tests/
            socket-http3/build/test-results/
            socket-webtransport/build/reports/tests/
            socket-webtransport/build/test-results/
            **/hs_err_pid*.log
            **/replay_pid*.log
          retention-days: 7
          if-no-files-found: ignore

      # macOS dylibs consumed by validate-artifacts.yaml (it injects them into the published klibs to
      # smoke-test resolution); the artifact name + macos-* path are load-bearing for that job.
      - name: Upload macOS quiche native libs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quiche-macos-natives
          path: socket-quic-quiche/libs/quiche/macos-*/lib/
          retention-days: 1
          if-no-files-found: ignore

      - name: Publish Apple targets to Maven Local
        run: >-
          ./gradlew --no-configuration-cache ${{ inputs.gradle-args }}
          publishKotlinMultiplatformPublicationToMavenLocal
          publishIosArm64PublicationToMavenLocal
          publishIosSimulatorArm64PublicationToMavenLocal
          publishIosX64PublicationToMavenLocal
          publishMacosArm64PublicationToMavenLocal
          publishMacosX64PublicationToMavenLocal
          publishTvosArm64PublicationToMavenLocal
          publishTvosSimulatorArm64PublicationToMavenLocal
          publishTvosX64PublicationToMavenLocal
          publishWatchosArm64PublicationToMavenLocal
          publishWatchosSimulatorArm64PublicationToMavenLocal
          publishWatchosX64PublicationToMavenLocal

      - name: Upload Maven local artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maven-local-apple
          path: ~/.m2/repository/com/ditchoom
          retention-days: 3

  # macosArm64 K/N tests split out of `build`, mirroring integration-linux-{x64,arm64}:
  # `build` links the .kexe (self-contained, libquiche.a -force_loaded), this job runs it.
  # The Apple QUIC/H3/WebTransport suites are in-process loopback — no Docker harness — and
  # locate their TLS fixtures via a <module>/testcerts/ fallback, so a plain checkout (which
  # carries the committed testcerts/) plus cwd=repo-root is all they need. macOS x64 + the
  # iOS/tvOS/watchOS sim tests still run inline in `build`'s Gradle.
  integration-macos-arm64:
    name: "Integration Tests (macOS ARM64)"
    needs: build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      # Checkout supplies the committed <module>/testcerts/ the loopback suites fall back to.
      - uses: actions/checkout@v7

      # Restores each module's test.kexe to its <module>/build/bin/macosArm64/debugTest/ path
      # (the artifact preserved the repo-root-relative structure), so running from repo root
      # resolves the per-module testcerts/ fallback.
      - name: Download macosArm64 test binaries
        uses: actions/download-artifact@v8
        with:
          name: macos-arm64-test-binaries

      - name: Run macosArm64 tests (all modules)
        run: |
          set -uo pipefail
          # find (not a `**` globstar) so this is portable to the macOS runner's bash 3.2.
          # The download brought only macosArm64 binaries, so any test.kexe is one of ours —
          # this matches both the structure-preserved paths and a flattened single file.
          found=$(find . -name test.kexe -type f)
          if [ -z "$found" ]; then
            echo "::error::no macosArm64 test.kexe downloaded — check the linkDebugTestMacosArm64 upload in build"
            exit 1
          fi
          rc=0
          : > /tmp/macos-arm64.log
          while IFS= read -r bin; do
            echo "==================== $bin ===================="
            chmod +x "$bin"
            # cwd = repo root so each module's <module>/testcerts/cert.* fallback resolves.
            "$bin" 2>&1 | tee -a /tmp/macos-arm64.log || rc=1
          done <<< "$found"
          exit $rc

      # Standalone .kexe runs print results to stdout (no JUnit XML like a Gradle run), so on
      # failure capture the combined log for diagnosis.
      - name: Upload macosArm64 test log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-test-log
          path: /tmp/macos-arm64.log
          retention-days: 7
          if-no-files-found: ignore
