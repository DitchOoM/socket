name: "Validate Merged Artifacts"

on:
  workflow_call:
    inputs:
      version:
        description: "Version string to validate"
        required: true
        type: string

jobs:
  validate:
    name: "Validate Artifacts"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: maven-local-linux
          path: /tmp/linux-repo/com/ditchoom

      - name: Download Apple artifacts
        uses: actions/download-artifact@v8
        with:
          name: maven-local-apple
          path: /tmp/apple-repo/com/ditchoom

      - name: Download macOS quiche native libs
        uses: actions/download-artifact@v8
        with:
          name: quiche-macos-natives
          path: /tmp/quiche-macos-natives
        continue-on-error: true  # may not exist if quiche build failed

      - name: Download Linux quiche native libs
        uses: actions/download-artifact@v8
        with:
          name: quiche-linux-natives
          path: /tmp/quiche-linux-natives
        continue-on-error: true  # may not exist if quiche build failed

      # Validate the version that was ACTUALLY built into maven-local, not the
      # workflow input. build-linux's getNextVersion reads Maven Central, and if a
      # release publishes mid-CI the input version can diverge from the version
      # build-linux actually stamped onto the artifacts here — then every resolution
      # below looks for a version that was never published and fails spuriously (the
      # known version-race red on otherwise-fine PRs). Deriving from the downloaded
      # artifacts is race-proof: we validate whatever was genuinely built.
      - name: Resolve built version
        run: |
          version=$(ls /tmp/linux-repo/com/ditchoom/socket/ 2>/dev/null \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          if [ -z "$version" ]; then
            echo "::error::No socket version present in the downloaded maven-local " \
              "(/tmp/linux-repo/com/ditchoom/socket/). build-linux's publish didn't produce " \
              "the artifacts — failing loudly rather than guessing a version to validate."
            exit 1
          fi
          echo "RESOLVED_VERSION=${version}" >> "$GITHUB_ENV"
          echo "Validating version: ${version} (workflow input was '${{ inputs.version }}')"

      - name: Merge artifacts and module metadata
        run: |
          version="${RESOLVED_VERSION}"
          LINUX_BASE="/tmp/linux-repo/com/ditchoom"
          APPLE_BASE="/tmp/apple-repo/com/ditchoom"
          MERGED="/tmp/maven-local/com/ditchoom"

          # Start with Linux artifacts
          mkdir -p /tmp/maven-local/com
          cp -r "$LINUX_BASE" /tmp/maven-local/com/

          # Copy Apple per-target artifacts for EVERY module. Glob is */ (not socket-*/):
          # a published module whose name doesn't start with "socket" — e.g.
          # network-monitor-iosarm64 — would otherwise be skipped, leaving its Apple klib
          # absent from the merged repo so `socket-iosarm64 -> network-monitor` fails to
          # resolve (the actual artifact, after its root .module already lists the variant).
          # Base module dirs (socket, network-monitor, …) are already copied from Linux
          # above and skipped by the guard; their root .module is merged separately below.
          for dir in "$APPLE_BASE"/*/; do
            [ -d "$dir" ] || continue
            target_name=$(basename "$dir")
            if [ -d "$MERGED/$target_name" ]; then
              echo "Skipping $target_name (already from Linux)"
              continue
            fi
            cp -r "$dir" "$MERGED/$target_name"
            echo "Copied $target_name"
          done

          # Merge root .module + metadata JAR for EVERY published KMP module, not
          # just the `socket` base. The per-target artifact dirs are already copied
          # above (socket-* glob covers socket-quic-macosarm64 etc.), but without
          # merging each module's ROOT .module the Apple klibs sit on Central
          # unreferenced — so an Apple consumer of socket-quic/socket-http3 can't
          # resolve them (the gap validate-resolution now guards against, having
          # previously only exercised `socket`). Per-module guard: a module missing
          # its Apple .module is simply left Linux-only (no worse than before).
          # socket-testsuite joined in W7 (RFC_DETERMINISTIC_SIMULATION §8) when it
          # became a published consumer-facing artifact — the #188 lesson below.
          for module in socket network-monitor socket-udp socket-quic socket-quic-quiche socket-quic-default socket-http3 socket-webtransport socket-testsuite; do
            LINUX_MODULE="$LINUX_BASE/$module/$version/$module-$version.module"
            APPLE_MODULE="$APPLE_BASE/$module/$version/$module-$version.module"
            MERGED_MODULE="$MERGED/$module/$version/$module-$version.module"

            if [ -f "$LINUX_MODULE" ] && [ -f "$APPLE_MODULE" ]; then
              jq -s '
                .[0].variants = (
                  [.[0].variants[], .[1].variants[]]
                  | group_by(.name)
                  | map(.[0])
                )
                | .[0]
              ' "$LINUX_MODULE" "$APPLE_MODULE" > "${MERGED_MODULE}.tmp"
              mv "${MERGED_MODULE}.tmp" "$MERGED_MODULE"
              echo "Merged $module .module: $(jq '.variants | length' "$MERGED_MODULE") variants"
            fi

            # Merge metadata JAR (kotlin-project-structure-metadata.json + klib dirs)
            LINUX_JAR="$LINUX_BASE/$module/$version/$module-$version.jar"
            APPLE_JAR="$APPLE_BASE/$module/$version/$module-$version.jar"
            MERGED_JAR="$MERGED/$module/$version/$module-$version.jar"

            if [ -f "$LINUX_JAR" ] && [ -f "$APPLE_JAR" ]; then
              WORK="/tmp/merge-metadata-jar/$module"
              mkdir -p "$WORK/linux" "$WORK/apple" "$WORK/merged"

              unzip -qo "$LINUX_JAR" -d "$WORK/linux"
              unzip -qo "$APPLE_JAR" -d "$WORK/apple"

              # Start with Linux as base
              cp -r "$WORK/linux/"* "$WORK/merged/"

              # Copy Apple klib directories
              if [ -d "$WORK/apple" ]; then
                for klib_dir in "$WORK/apple"/*/; do
                  dir_name=$(basename "$klib_dir")
                  [ "$dir_name" = "META-INF" ] && continue
                  if [ ! -d "$WORK/merged/$dir_name" ]; then
                    cp -r "$klib_dir" "$WORK/merged/$dir_name"
                    echo "Copied $module klib dir: $dir_name"
                  fi
                done
              fi

              # Merge kotlin-project-structure-metadata.json
              LINUX_PSM="$WORK/linux/META-INF/kotlin-project-structure-metadata.json"
              APPLE_PSM="$WORK/apple/META-INF/kotlin-project-structure-metadata.json"
              MERGED_PSM="$WORK/merged/META-INF/kotlin-project-structure-metadata.json"

              if [ -f "$LINUX_PSM" ] && [ -f "$APPLE_PSM" ]; then
                jq -s '
                  .[0].projectStructure.variants = (
                    [.[0].projectStructure.variants[], .[1].projectStructure.variants[]]
                    | group_by(.name)
                    | map(.[0])
                  )
                  | .[0].projectStructure.sourceSets = (
                    [.[0].projectStructure.sourceSets[], .[1].projectStructure.sourceSets[]]
                    | group_by(.name)
                    | map(.[0])
                  )
                  | .[0]
                ' "$LINUX_PSM" "$APPLE_PSM" > "${MERGED_PSM}.tmp"
                mv "${MERGED_PSM}.tmp" "$MERGED_PSM"
                echo "Merged $module kotlin-project-structure-metadata.json:"
                echo "  variants: $(jq '.projectStructure.variants | length' "$MERGED_PSM")"
                echo "  sourceSets: $(jq '.projectStructure.sourceSets | length' "$MERGED_PSM")"
              fi

              # Re-create the merged JAR (zip -r refreshes existing entries in place)
              (cd "$WORK/merged" && zip -qr "$MERGED_JAR" .)
              echo "Rebuilt $module metadata JAR"

              rm -rf "$WORK"
            fi
          done

      - name: Inject native libs into socket-quic-quiche JVM JAR
        run: |
          version="${RESOLVED_VERSION}"
          MERGED="/tmp/maven-local/com/ditchoom"
          QUIC_JAR="$MERGED/socket-quic-quiche-jvm/$version/socket-quic-quiche-jvm-$version.jar"

          if [ ! -f "$QUIC_JAR" ]; then
            echo "Skipping native injection: socket-quic-quiche-jvm JAR not found"
            exit 0
          fi

          # Re-nest under META-INF/native/<platform>/ so paths match
          # NativeLibLoader's resource lookup. Each artifact's per-platform dir
          # contains a `lib/` subdirectory (libs/quiche/<platform>/lib/); older
          # uploads put libs at the platform root, so detect-and-strip `lib/`
          # when present.
          INJECT_DIR="/tmp/inject-natives"
          mkdir -p "$INJECT_DIR/META-INF/native"

          inject_natives() {
            local artifact_dir=$1
            local platform_glob=$2
            local extension=$3
            for dir in "$artifact_dir"/${platform_glob}/; do
              [ -d "$dir" ] || continue
              platform=$(basename "${dir%/}")
              src="${dir%/}"
              [ -d "$src/lib" ] && src="$src/lib"
              mkdir -p "$INJECT_DIR/META-INF/native/$platform"
              cp "$src"/*.${extension} "$INJECT_DIR/META-INF/native/$platform/" 2>/dev/null || true
              echo "  Staged META-INF/native/$platform/ from $src"
            done
          }

          [ -d /tmp/quiche-macos-natives ] && inject_natives /tmp/quiche-macos-natives 'macos-*' dylib
          [ -d /tmp/quiche-linux-natives ] && inject_natives /tmp/quiche-linux-natives 'linux-*'   so

          if [ -d "$INJECT_DIR/META-INF/native" ] && [ -n "$(find "$INJECT_DIR/META-INF/native" -type f)" ]; then
            (cd "$INJECT_DIR" && zip -ur "$QUIC_JAR" META-INF/native/)
            echo "socket-quic-quiche JVM JAR native libs:"
            unzip -l "$QUIC_JAR" | grep "META-INF/native" || true
          else
            echo "No platform natives found to inject"
          fi
          rm -rf "$INJECT_DIR"

      - name: Upload merged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maven-local-merged
          path: /tmp/maven-local
          retention-days: 1

      - name: Checkout validation project
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .ci/validate-resolution
            gradle/libs.versions.toml
          sparse-checkout-cone-mode: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate with Gradle resolution
        run: |
          gradle -p .ci/validate-resolution resolveAll \
            -PsocketVersion=${{ env.RESOLVED_VERSION }} \
            -PmavenRepoPath=/tmp/maven-local \
            --no-daemon

      - name: Validate artifacts
        run: |
          version="${RESOLVED_VERSION}"
          MERGED="/tmp/maven-local/com/ditchoom"
          FAILED=false

          # ── 1. Root module metadata — platform variants ──
          MODULE="$MERGED/socket/${version}/socket-${version}.module"
          if [ ! -f "$MODULE" ]; then
            echo "FAIL: root .module file not found"
            exit 1
          fi

          VARIANTS=$(jq -r '.variants[].name' "$MODULE")

          # ApiElements-published: jvm, js, linuxX64, linuxArm64 + 11 Apple
          for v in jvm js \
            linuxX64 linuxArm64 \
            macosArm64 macosX64 \
            iosArm64 iosSimulatorArm64 iosX64 \
            tvosArm64 tvosSimulatorArm64 tvosX64 \
            watchosArm64 watchosSimulatorArm64 watchosX64; do
            if echo "$VARIANTS" | grep -q "^${v}ApiElements-published$"; then
              echo "ApiElements OK: $v"
            else
              echo "FAIL: missing ${v}ApiElements-published variant"
              FAILED=true
            fi
          done

          # MetadataElements-published: Apple targets (enables IDE resolution for
          # intermediate source sets like iosMain, tvosMain, watchosMain, appleMain)
          for v in macosArm64 macosX64 \
            iosArm64 iosSimulatorArm64 iosX64 \
            tvosArm64 tvosSimulatorArm64 tvosX64 \
            watchosArm64 watchosSimulatorArm64 watchosX64; do
            if echo "$VARIANTS" | grep -q "^${v}MetadataElements-published$"; then
              echo "MetadataElements OK: $v"
            else
              echo "FAIL: missing ${v}MetadataElements-published variant"
              FAILED=true
            fi
          done

          # ── 1b. EVERY KMP module's root .module must reference its Apple variants ──
          # The merge loop above unions each module's Linux + Apple root .module. A module
          # left OUT of that loop keeps the Linux-only root module (no Apple variants), so its
          # Apple klibs sit on Central unreferenced and Apple consumers can't resolve it — exactly
          # how socket-webtransport shipped Apple-broken in 3.6.6..3.6.9 (absent from the loop).
          # Assert, for every module that published an Apple root .module, that every Apple variant
          # in it survived into the merged root .module. This catches a future module addition that
          # forgets to extend the merge loop, which the socket-only checks above cannot see.
          APPLE_BASE="/tmp/apple-repo/com/ditchoom"
          for module in socket network-monitor socket-udp socket-quic socket-quic-quiche socket-quic-default socket-http3 socket-webtransport socket-testsuite; do
            APPLE_MODULE="$APPLE_BASE/$module/${version}/$module-${version}.module"
            MERGED_MODULE="$MERGED/$module/${version}/$module-${version}.module"
            [ -f "$APPLE_MODULE" ] || continue
            APPLE_VARIANTS=$(jq -r '.variants[].name' "$APPLE_MODULE" \
              | grep -iE 'macos|ios|tvos|watchos' | sort -u)
            [ -n "$APPLE_VARIANTS" ] || continue
            MERGED_VARIANTS=$(jq -r '.variants[].name' "$MERGED_MODULE" 2>/dev/null | sort -u)
            MISSING=$(comm -23 <(echo "$APPLE_VARIANTS") <(echo "$MERGED_VARIANTS"))
            if [ -n "$MISSING" ]; then
              echo "FAIL: $module merged root .module is missing Apple variants (module not in merge loop?):"
              echo "$MISSING" | sed 's/^/  /'
              FAILED=true
            else
              count=$(echo "$APPLE_VARIANTS" | wc -l | tr -d ' ')
              echo "Apple variants OK in merged root .module: $module ($count apple variants)"
            fi
          done

          # ── 2. Apple klib presence ──
          for target in macosarm64 macosx64 \
            iosarm64 iossimulatorarm64 iosx64 \
            tvosarm64 tvossimulatorarm64 tvosx64 \
            watchosarm64 watchossimulatorarm64 watchosx64; do
            KLIB="$MERGED/socket-${target}/${version}/socket-${target}-${version}.klib"
            if [ -f "$KLIB" ]; then
              echo "klib OK: $target"
            else
              echo "FAIL: missing klib for $target"
              FAILED=true
            fi
          done

          # ── 3. Android AAR presence ──
          AAR="$MERGED/socket-android/${version}/socket-android-${version}.aar"
          if [ -f "$AAR" ]; then
            echo "Android AAR present"
          else
            echo "FAIL: Android AAR not found"
            FAILED=true
          fi

          # ── 4. Metadata JAR Apple source sets ──
          METADATA_JAR="$MERGED/socket/${version}/socket-${version}.jar"
          if [ ! -f "$METADATA_JAR" ]; then
            echo "FAIL: metadata JAR not found"
            FAILED=true
          else
            PSM_JSON=$(unzip -p "$METADATA_JAR" META-INF/kotlin-project-structure-metadata.json 2>/dev/null)
            if [ -z "$PSM_JSON" ]; then
              echo "FAIL: kotlin-project-structure-metadata.json not found in JAR"
              FAILED=true
            else
              for ss in appleMain iosMain tvosMain watchosMain; do
                if echo "$PSM_JSON" | jq -e ".projectStructure.sourceSets[] | select(.name == \"$ss\")" > /dev/null 2>&1; then
                  echo "sourceSet OK: $ss"
                else
                  echo "FAIL: metadata JAR missing sourceSet '$ss'"
                  FAILED=true
                fi
              done
            fi
          fi

          # ── 5. socket-quic-quiche JVM JAR native libs ──
          # windows-x64 is intentionally NOT listed: no Windows quiche JNI
          # native is currently built into the publish pipeline (the
          # nativeLibsByPlatform map in socket-quic-quiche/build.gradle.kts excludes
          # windows-*). Tracked in TODO.md \"Windows quiche JNI native\".
          QUIC_JAR="$MERGED/socket-quic-quiche-jvm/${version}/socket-quic-quiche-jvm-${version}.jar"
          if [ -f "$QUIC_JAR" ]; then
            echo "socket-quic-quiche JVM JAR found"
            for platform in linux-x64 linux-arm64 macos-arm64 macos-x64; do
              LIB_PATTERN="META-INF/native/$platform/"
              if unzip -l "$QUIC_JAR" | grep -q "$LIB_PATTERN"; then
                echo "  native OK: $platform"
              else
                echo "  FAIL: missing native libs for $platform"
                FAILED=true
              fi
            done
          else
            echo "INFO: socket-quic-quiche JVM JAR not found (expected if not published)"
          fi

          # ── 6. Signing coverage — detect uncovered file types ──
          SIGNED_EXTENSIONS="jar klib pom module aar json"
          UNCOVERED=$(find /tmp/maven-local -type f \
            ! -name "*.asc" ! -name "*.md5" ! -name "*.sha1" \
            $(for ext in $SIGNED_EXTENSIONS; do echo "! -name *.${ext}"; done) \
            2>/dev/null || true)
          if [ -n "$UNCOVERED" ]; then
            echo ""
            echo "WARNING: file types not covered by signing glob:"
            echo "$UNCOVERED" | sed 's/.*\./  ./' | sort -u
          fi

          # ── Result ──
          if [ "$FAILED" = true ]; then
            echo ""
            echo "=== VALIDATION FAILED ==="
            exit 1
          fi
          echo ""
          echo "=== ALL VALIDATIONS PASSED ==="
