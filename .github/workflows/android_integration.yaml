name: "Android Emulator Integration Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened
jobs:
  android-emulator:
    runs-on: ubuntu-latest
    # 25, not 15: a passing run already takes ~14m58s (emulator boot + KVM-accelerated
    # instrumented tests), so a 15-min cap tips a healthy run into a "cancelled" timeout on
    # any normal runner-speed jitter. 25 leaves comfortable headroom while still bounding a
    # genuine hang (e.g. an emulator that never boots).
    timeout-minutes: 25
    env:
      # Force-kill emulator after 1 second instead of waiting 20 seconds for graceful shutdown
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 1
    strategy:
      matrix:
        api-level: [29]
    steps:
      - name: checkout
        uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The aggregate `connectedAndroidTest` task graph reaches the root
      # `:buildBoringsslArm64` task (the linuxArm64 Kotlin/Native BoringSSL build),
      # whose CMake toolchain needs the GNU aarch64 cross-compiler. Without it the
      # job failed at `:buildBoringsslArm64` with
      # `CMAKE_CXX_COMPILER aarch64-linux-gnu-g++ ... not found`. Install it (the fix
      # the root build.gradle.kts comment already prescribes). NOTE: building the
      # linuxArm64 lib in an x86_64 emulator job is wasteful — de-scoping that task
      # from the Android test graph is a follow-up.
      - name: Install aarch64 GNU cross-compiler (for :buildBoringsslArm64)
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Rust + cargo-ndk
        uses: dtolnay/rust-toolchain@stable
      # All four Android Rust targets are needed because socket-quic-quiche's
      # build.gradle.kts enumerates arm64-v8a / armeabi-v7a / x86_64 / x86
      # ABIs (see `androidAbis` list); cargo-ndk fails if any target is
      # missing. The previous list omitted armv7-linux-androideabi and
      # i686-linux-android, causing :socket-quic-quiche:buildAndroidJniArmeabiv7a
      # to fail in this job.
      - run: |
          rustup target add x86_64-linux-android aarch64-linux-android \
              armv7-linux-androideabi i686-linux-android
          cargo install cargo-ndk

      - name: Build Android QUIC native libs
        continue-on-error: true
        run: |
          # Clone quiche source
          mkdir -p socket-quic-quiche/build/quiche
          git clone --recursive --depth 1 --branch 0.28.0 \
            https://github.com/cloudflare/quiche.git socket-quic-quiche/build/quiche/quiche-src

          # Build for x86_64 (emulator)
          cd socket-quic-quiche/build/quiche/quiche-src
          cargo ndk --target x86_64 --platform 24 -- build --release --package quiche \
            --no-default-features --features ffi,boringssl-vendored
          cd ${{ github.workspace }}

          # Build JNI shim
          NDK_TC="$ANDROID_SDK_ROOT/ndk/$(ls $ANDROID_SDK_ROOT/ndk/ | head -1)/toolchains/llvm/prebuilt/linux-x86_64"
          QUICHE_LIB=$(find socket-quic-quiche/build/quiche -path "*x86_64-linux-android*release*libquiche.a" | head -1)
          if [ -n "$QUICHE_LIB" ]; then
            mkdir -p socket-quic-quiche/src/androidMain/jniLibs/x86_64
            $NDK_TC/bin/x86_64-linux-android24-clang -shared -fPIC -Wall \
              -o socket-quic-quiche/src/androidMain/jniLibs/x86_64/libquiche_jni.so \
              socket-quic-quiche/src/jni/quiche_jni.c \
              -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux \
              -I socket-quic-quiche/libs/quiche/include \
              -Wl,--whole-archive $QUICHE_LIB -Wl,--no-whole-archive \
              -lm -ldl -llog \
              && $NDK_TC/bin/llvm-strip --strip-all socket-quic-quiche/src/androidMain/jniLibs/x86_64/libquiche_jni.so \
              && echo "Built Android x86_64 JNI shim"
          fi

      # Bring up the docker quic-echo harness (same image / port as
      # build-linux + build-apple) before the emulator starts. The
      # Android emulator's 10.0.2.2 maps to the host's loopback, so
      # AndroidQuicConnectivityTests + AndroidQuicMigrationTests reach
      # `10.0.2.2:<QuicHarnessConfig.quicEchoPort>` over UDP through to
      # the container bound on `127.0.0.1:14433/udp`.
      #
      # Previous setup ran no server at all and used `adb reverse
      # tcp:4433 tcp:4433` — wrong on two counts: adb reverse only
      # supports TCP (QUIC is UDP) and no QuicEchoTestServer ever
      # started on the host. The result was a quiet skip of every
      # instrumented QUIC test via the `assumeTrue(...)` in
      # AndroidQuicConnectivityTests.checkServerReachable's catch
      # block. This was the Android side of the same silent-skip
      # failure mode being fixed across the comprehensive QUIC CI plan
      # (macOS = PR #51, Linux ARM64 = PR #52).
      - name: Generate harness TLS certs
        run: bash test-harness/tls/gen-certs.sh

      # Build the quic-echo fat jar so docker compose's `build: ./quic-echo`
      # has the COPY input it needs. Default (host-arch-only) is enough —
      # the docker image base + jar are both linux-x64 for this job, which
      # matches the ubuntu-latest runner. The container then exposes
      # 14433/udp on the host's loopback, where the emulator reaches it via
      # 10.0.2.2.
      - name: Build quic-echo fat jar (Linux x64)
        run: ./gradlew :socket-quic-quiche:quicEchoJar --no-configuration-cache

      - name: Bring up quic-echo via the docker harness
        run: bash test-harness/compose-up-retry.sh quic-echo

      # restore/save are deliberately SPLIT (not the unified actions/cache):
      # the unified action saves at job END — after `run tests` — so every
      # cache-miss run caches AVD userdata WITH the test APKs installed,
      # possibly torn from the emulator teardown mid-write. The next run then
      # fails before any test: the stale install can neither be uninstalled
      # (DELETE_FAILED_INTERNAL_ERROR on old API levels) nor reinstalled over
      # (INSTALL_PARSE_FAILED_INCONSISTENT_CERTIFICATES). Saving explicitly
      # right after the create-AVD step caches the PRISTINE snapshot — no
      # package ever installed. (Root-caused in DitchOoM/buffer#186 where the
      # API-21 lane was failing this way on every second run.)
      - name: AVD cache (restore)
        uses: actions/cache/restore@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-x86_64-${{ matrix.api-level }}

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: AVD cache (save pristine snapshot)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-x86_64-${{ matrix.api-level }}

      - name: run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -writable-system -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb root || true
            adb wait-for-device
            # The previous `adb reverse tcp:4433 tcp:4433` is gone: QUIC
            # is UDP and adb reverse only handles TCP. The emulator
            # reaches the host's docker-published 127.0.0.1:14433/udp
            # via its built-in 10.0.2.2 host alias — no port forwarding
            # needed. AndroidQuicConnectivityTests + AndroidQuicMigrationTests
            # now point at 10.0.2.2:14433 (matches QuicHarnessConfig.quicEchoPort).
            #
            # Start the host-side NetworkControlServer (TCP :9998 + `adb reverse
            # tcp:9998`) BEFORE the tests so AndroidQuicMigrationTests' netem /
            # resilience suite actually RUNS instead of skipping on
            # `NetworkControl.isAvailable() == false`. The server drives
            # `adb shell su 0 iptables/tc/settings` on the rooted emulator (the
            # `adb root` above) to toggle UDP / latency / airplane-mode while the
            # device-side TCP control channel (10.0.2.2:9998) stays up. This is
            # issue #72 Task 1 — the docker quic-echo (14433/udp) stays up for the
            # connect + migration tests. Run as a separate Gradle invocation so its
            # detached host JVM is alive before connectedAndroidTest starts.
            ./gradlew :socket-quic-quiche:startNetworkControlServer
            ./gradlew connectedAndroidTest :socket-quic-quiche:connectedAndroidTest
            ./gradlew :socket-quic-quiche:stopNetworkControlServer || true

      # Mirror the audit step from build-apple.yaml + build-linux.yaml:
      # count `harness OK` vs `harness SKIP` markers from
      # QuicHarnessIntegrationTests' withHarness() across the
      # connectedAndroidTest report XMLs. Surfaces a regression that
      # silently breaks the Android QUIC client as a CI warning instead
      # of letting it pass via the skip-on-failure catch.
      - name: Audit QUIC harness coverage on Android
        if: always()
        continue-on-error: true
        run: |
          REPORT_ROOT=socket-quic-quiche/build/outputs/androidTest-results
          if [ ! -d "$REPORT_ROOT" ]; then
            echo "no android instrumented-test results — audit skipped"
            exit 0
          fi
          OK=$(grep -rh 'harness OK' "$REPORT_ROOT" 2>/dev/null | wc -l | tr -d ' ')
          SKIP=$(grep -rh 'harness SKIP' "$REPORT_ROOT" 2>/dev/null | wc -l | tr -d ' ')
          # Distinct skip reasons (dedup + count). Bound to [^<&] so the match
          # stops at the next XML entity/tag in the androidTest result reports.
          SKIP_REASONS=$(grep -rhoE 'harness SKIP: [^<&]+' "$REPORT_ROOT" 2>/dev/null \
            | sed -E 's/^harness SKIP: //' | sort | uniq -c | sed -E 's/^ *//' | sort -rn)
          echo "QuicHarnessIntegrationTests on Android: OK=$OK, SKIP=$SKIP"
          [ -n "$SKIP_REASONS" ] && echo "Skip reasons:" && echo "$SKIP_REASONS"
          {
            echo "## QUIC harness — Android (emulator)"
            echo ""
            echo "| OK | SKIP |"
            echo "|---|---|"
            echo "| $OK | $SKIP |"
            if [ -n "$SKIP_REASONS" ]; then
              echo ""
              echo "<details><summary>Skip reasons (Android)</summary>"
              echo ""
              echo '```'
              echo "$SKIP_REASONS"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$OK" = "0" ] && [ "$SKIP" != "0" ]; then
            echo "::warning::Every QuicHarnessIntegrationTest skipped on Android — emulator QUIC client not actually validated"
          fi

      - name: Bring down quic-echo harness
        if: always()
        run: cd test-harness && docker compose down -v

      - name: Kill emulator processes
        if: always()
        run: |
          pkill -SIGTERM crashpad_handler || true
          sleep 2
          pkill -SIGKILL crashpad_handler || true
          adb emu kill || true
