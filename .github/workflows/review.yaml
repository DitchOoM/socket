name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yaml

  build-apple:
    uses: ./.github/workflows/build-apple.yaml

  validate:
    needs: [build-linux, build-apple]
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}

  # Phase 5 — harness-backed PR gate. Runs the in-repo Docker harness on every
  # supported runner arch. Replaces the old label-gated integration.yaml.
  # ubuntu-24.04 + ubuntu-24.04-arm exercise the multi-arch native + JVM paths;
  # macos-latest covers JVM-on-macOS (Apple K/N targets are still validated in
  # build-apple.yaml, which is where Colima + cert injection also live).
  harness:
    name: "Harness (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      # macOS lacks a daemon by default; Colima gives us a Docker-CLI-compatible
      # daemon without the Docker Desktop license.
      - name: Install Colima (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install colima docker
          colima start --cpu 2 --memory 4 --disk 20

      - name: Generate harness TLS certs
        run: bash test-harness/tls/gen-certs.sh

      # Per-platform CA-trust injection so tlsDefault() (the runtime default
      # validator) accepts the harness server cert — see HANDOFF.md §7.3.
      # Trust-store steps use `|| true` to stay idempotent across re-runs on
      # warm runners; a duplicate-alias keytool failure on retry is benign.
      - name: Trust harness CA (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo cp test-harness/tls/certs/ca.crt /usr/local/share/ca-certificates/harness-root.crt
          sudo update-ca-certificates

      - name: Trust harness CA in JVM keystore (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo keytool -delete -alias harness-root \
              -keystore "$JAVA_HOME/lib/security/cacerts" \
              -storepass changeit 2>/dev/null || true
          sudo keytool -importcert -trustcacerts \
              -file test-harness/tls/certs/ca.crt \
              -alias harness-root \
              -keystore "$JAVA_HOME/lib/security/cacerts" \
              -storepass changeit -noprompt

      - name: Trust harness CA (macOS keychain)
        if: runner.os == 'macOS'
        run: |
          sudo security add-trusted-cert -d -r trustRoot \
              -k /Library/Keychains/System.keychain test-harness/tls/certs/ca.crt

      - name: Trust harness CA in JVM keystore (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo keytool -delete -alias harness-root \
              -keystore "$JAVA_HOME/lib/security/cacerts" \
              -storepass changeit 2>/dev/null || true
          sudo keytool -importcert -trustcacerts \
              -file test-harness/tls/certs/ca.crt \
              -alias harness-root \
              -keystore "$JAVA_HOME/lib/security/cacerts" \
              -storepass changeit -noprompt

      # ktlint as a fast pre-check — fail before spinning up the harness if the
      # diff has style errors. Per TODO.md "Pre-existing ktlint debt" bullet.
      - name: Lint (ktlintCheck)
        run: ./gradlew ktlintCheck

      # `check` triggers harnessUp/harnessDown for the wired test tasks
      # (jvmTest, linuxX64Test, jsNodeTest). Browser/wasmJs tests early-return
      # on WEBSOCKETS_ONLY so they remain a no-op against the harness.
      - name: Run check (base module — harness lifecycle wired)
        run: ./gradlew check

      # Split socket-quic into its own invocation so its harness lifecycle is
      # isolated from the base module — HANDOFF.md Phase 4 notes a single
      # combined run can cause StaleConnectionDiagnosticTests timeout flakes
      # on resource-constrained runners due to JVM+native workload contention.
      - name: Run check (socket-quic — isolated harness lifecycle)
        run: ./gradlew :socket-quic:check

      - name: Upload test reports (base module)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-base-${{ matrix.os }}
          path: build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test reports (socket-quic)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-quic-${{ matrix.os }}
          path: socket-quic/build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore

  build-windows:
    name: "Windows JVM Tests"
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Run JVM tests
        run: ./gradlew jvmTest socket-quic:jvmTest --no-configuration-cache

  docs:
    name: "Validate Docs Generation"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json
      - name: Generate API Documentation with Dokka
        run: ./gradlew copyDokkaToDocusaurus
      - name: Install docs dependencies
        working-directory: docs
        run: npm ci
      - name: Build docs site
        working-directory: docs
        run: npm run build
