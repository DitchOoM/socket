name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yaml

  build-apple:
    uses: ./.github/workflows/build-apple.yaml

  validate:
    needs: [build-linux, build-apple]
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}

  # Consumer-smoke: drive the MERGED published artifacts as a real downstream consumer would.
  # `validate` (above) RESOLVES the dependency graph and checks module-metadata shape; it never
  # COMPILES consumer code against the API, LINKS a Kotlin/Native binary, or RUNS anything. This job
  # closes that gap against the same `maven-local-merged` artifact:
  #   • JVM behavioural smoke  — a real withHttp3Server↔withHttp3Connection loopback over QUIC
  #     (gating): proves the published JVM artifacts load their native lib + round-trip HTTP/3,
  #     the native-load / FFM-packaging class of bug source-built lanes never see.
  #   • Bytecode-version guard — asserts the base jvm jars are Java 8 (v52) (gating): the toolchain
  #     is JDK 21 on every lane, so without this a silent re-regression to v65 (which actually
  #     shipped once) is invisible to CI.
  #   • Linux Kotlin/Native LINK — `linuxX64TestBinaries` links a consumer test binary that reaches the
  #     full QUIC stack from the published klib (Gap A embeds libquiche.a into the Quiche cinterop klib).
  #     GATING. Weak vs undefined symbols (the base klib manifest ignores them at link — see the step's
  #     note); the Apple link gate below + the linuxX64Test handshake suite are the strong Gap-A catchers.
  consumer-smoke:
    name: "Consumer Smoke (JVM + Linux link)"
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Download merged maven-local
        uses: actions/download-artifact@v8
        with:
          name: maven-local-merged
          path: /tmp/maven-local-merged
      # Derive the version from the artifacts actually built (race-proof; the workflow input can
      # diverge if a release publishes mid-CI — the same reasoning validate-artifacts uses).
      - name: Resolve built version
        run: |
          version=$(ls /tmp/maven-local-merged/com/ditchoom/socket/ 2>/dev/null \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          if [ -z "$version" ]; then
            echo "::error::No socket version in the merged maven-local — validate didn't produce artifacts."
            exit 1
          fi
          echo "RESOLVED_VERSION=${version}" >> "$GITHUB_ENV"
          echo "Smoke-testing version: ${version}"
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      # W7: bring up the echo + controller subset of the docker harness so the
      # withNetworkHarness consumer smoke (HarnessConsumerSmokeTest, part of jvmTest below)
      # performs a REAL echo round-trip through the PUBLISHED socket-testsuite artifact.
      # The controller jar is built from source here — it is harness *infrastructure*, not
      # the artifact under test (that's the socket-testsuite the test resolves from the
      # merged repo). If the stack still fails to come up, compose-up-retry fails the job
      # loudly (a silent skip is exactly the coverage gap the harness discipline exists to
      # avoid); the tests themselves stay green off-CI via withNetworkHarness's
      # skip-on-unreachable.
      #
      # Building it on a Linux runner enables every linux-target task in the graph, and
      # the KMP metadata/cinterop chain reaches the arm64 native prerequisites
      # (:buildBoringsslArm64 cmake-configures with aarch64-linux-gnu-g++; the quiche
      # linux-arm64 .a cargo-builds against the aarch64-unknown-linux-gnu target). Install
      # the same cross toolchain the other Linux lanes use or the jar build dies at cmake
      # configure — same failure class android_integration.yaml already documents.
      - name: Install arm64 cross toolchain (linux-target tasks in the jar's task graph)
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libclang-dev
          rustup target add aarch64-unknown-linux-gnu
      - name: Build harness controller jar (harness infrastructure)
        run: ./gradlew :socket-testsuite:controllerJar --no-configuration-cache
      - name: Bring up harness (echo + controller)
        run: bash test-harness/compose-up-retry.sh echo controller
      - name: JVM behavioural smoke (HTTP/3 loopback + withNetworkHarness echo)
        run: |
          gradle -p .ci/consumer-smoke jvmTest \
            -PsocketVersion="${RESOLVED_VERSION}" \
            -PmavenRepoPath=/tmp/maven-local-merged \
            --no-daemon
      # The harness echo round-trip must have actually RUN here (the stack is up), not
      # taken the skip path — otherwise a regression that silently breaks the manifest
      # fetch would keep this lane green forever.
      - name: Assert harness smoke ran (no silent skip)
        run: |
          if grep -rq "harness echo OK" .ci/consumer-smoke/build/test-results/jvmTest/; then
            echo "withNetworkHarness echo round-trip ran against the live stack"
          else
            echo "::error::HarnessConsumerSmokeTest took the skip path despite the harness being up"
            grep -rh "consumer-smoke" .ci/consumer-smoke/build/test-results/jvmTest/ || true
            exit 1
          fi
      - name: Tear down harness
        if: always()
        run: docker compose -f test-harness/docker-compose.yml down -v || true
      - name: Bytecode-version guard (base jvm jars must be Java 8 / v52)
        run: |
          version="${RESOLVED_VERSION}"
          MERGED="/tmp/maven-local-merged/com/ditchoom"
          FAIL=0
          # socket-http3 / socket-webtransport are NOT listed yet: they ship v65 until their Java-8
          # target lands (PR #183). Add them here once that merges so a future re-regression is caught.
          assert_v52() {
            local mod="$1"
            local jar="$MERGED/${mod}-jvm/${version}/${mod}-jvm-${version}.jar"
            if [ ! -f "$jar" ]; then
              echo "::error::${mod}-jvm jar not found at $jar"; FAIL=1; return
            fi
            local tmp; tmp=$(mktemp -d); unzip -qo "$jar" -d "$tmp"
            local bad=0
            # Exclude META-INF/versions/* — multi-release overlays (socket-quic-quiche's FFM bindings)
            # are deliberately higher; only the BASE classes must be v52.
            while IFS= read -r c; do
              local major; major=$(od -An -tu1 -j7 -N1 "$c" | tr -d ' ')
              if [ "$major" != "52" ]; then echo "  non-v52 ($major): ${c#"$tmp"/}"; bad=1; fi
            done < <(find "$tmp" -name '*.class' -not -path '*/META-INF/versions/*')
            if [ "$bad" = 1 ]; then echo "::error::${mod} has non-Java-8 base classes"; FAIL=1; else echo "  OK v52: ${mod}"; fi
            rm -rf "$tmp"
          }
          for mod in socket socket-quic socket-quic-quiche socket-quic-default; do
            assert_v52 "$mod"
          done
          [ "$FAIL" = 0 ] || { echo "=== BYTECODE GUARD FAILED ==="; exit 1; }
          echo "=== bytecode guard passed ==="
      # Gap A landed: the published K/N artifacts now embed libquiche.a in the Quiche cinterop klib, so
      # this consumer test binary links the full QUIC stack from the published klib alone. GATING.
      # NOTE: the base :socket: module's klib manifest carries --unresolved-symbols=ignore-in-object-files
      # (it rides every linux K/N link), so an undefined quiche_* is deferred to runtime rather than
      # failing here — treat this Linux link as a compile+resolve+link smoke. The strong Gap-A catchers
      # are the Apple link gate below (ld64 has no such flag) and the linuxX64Test handshake suite (build-linux).
      - name: Linux K/N link gate (Gap A)
        run: |
          gradle -p .ci/consumer-smoke linuxX64TestBinaries \
            -PsocketVersion="${RESOLVED_VERSION}" \
            -PmavenRepoPath=/tmp/maven-local-merged \
            --no-daemon

  # Apple Kotlin/Native LINK gate — the strong Gap-A catcher. Links (does not run; iOS needs no
  # simulator) the consumer test binaries against the published klib. ld64 fails hard on an undefined
  # quiche_* symbol, so an undistributed/unembedded libquiche.a surfaces as the link error it is.
  # GATING now that Gap A embeds the archive (+ the Apple frameworks, via klib manifest linkerOpts)
  # into the Quiche cinterop klib — validated locally: external consumer test.kexe links macosArm64 +
  # iosSimulatorArm64 with 0 undefined quiche/ssl symbols and Security/Network/CF/libc++ propagated.
  consumer-smoke-apple:
    name: "Consumer Smoke (Apple K/N link)"
    needs: [validate]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Download merged maven-local
        uses: actions/download-artifact@v8
        with:
          name: maven-local-merged
          path: /tmp/maven-local-merged
      - name: Resolve built version
        run: |
          version=$(ls /tmp/maven-local-merged/com/ditchoom/socket/ 2>/dev/null \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          [ -n "$version" ] || { echo "::error::No socket version in merged maven-local"; exit 1; }
          echo "RESOLVED_VERSION=${version}" >> "$GITHUB_ENV"
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Apple K/N link gate (macosArm64 + iosSimulatorArm64)
        run: |
          gradle -p .ci/consumer-smoke macosArm64TestBinaries iosSimulatorArm64TestBinaries \
            -PsocketVersion="${RESOLVED_VERSION}" \
            -PmavenRepoPath=/tmp/maven-local-merged \
            --no-daemon

  # Aggregates per-platform QUIC harness coverage into one markdown
  # matrix visible in the workflow run summary. Each platform's audit
  # step uploads a `quic-audit-<platform>` artifact with OK/SKIP counts;
  # this job downloads them all, prints the combined table, and fails
  # if any platform reports OK=0 with SKIP>0 (i.e., the QUIC client
  # silently stopped exercising the harness).
  #
  # Android instrumented tests live in a separate workflow file
  # (android_integration.yaml) and aren't covered here — cross-workflow
  # artifact passing in GHA needs API-level coordination that's out of
  # scope for this phase. The Android job's own audit step writes its
  # summary to its own job page.
  quic-interop-summary:
    name: "QUIC Interop Summary"
    needs: [build-linux, build-apple]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all QUIC audit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: quic-audit-*
          path: /tmp/quic-audit
          merge-multiple: true
          # download-artifact@v8 defaults digest-mismatch to `error`, which aborts the WHOLE download
          # (delivering zero files) when GHA's per-artifact digest check trips on these tiny audit
          # files — reding the summary on every PR. `warn` keeps the files so the summary still runs.
          digest-mismatch: warn
        continue-on-error: true

      - name: Build interop matrix
        run: |
          shopt -s nullglob
          FILES=(/tmp/quic-audit/*.txt)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No QUIC audit artifacts found — every platform audit either"
            echo "didn't upload (continue-on-error path) or this run pre-dates"
            echo "the per-platform audit wireup."
            {
              echo "## QUIC Interop Summary"
              echo ""
              echo "_No audit artifacts uploaded by any platform job._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## QUIC Interop Summary"
            echo ""
            echo "| Platform | OK | SKIP | Status |"
            echo "|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          # Reason <details> blocks are buffered here and flushed AFTER the
          # table — emitting them inside the loop would split the markdown
          # table and break its rendering.
          REASONS_OUT=$(mktemp)
          for f in "${FILES[@]}"; do
            platform=$(grep '^platform=' "$f" | cut -d= -f2)
            launched=$(grep '^launched=' "$f" | cut -d= -f2)
            applicable=$(grep '^applicable=' "$f" | cut -d= -f2)
            ok=$(grep '^ok=' "$f" | cut -d= -f2)
            skip=$(grep '^skip=' "$f" | cut -d= -f2)
            intentional_skip=$(grep '^intentional_skip=' "$f" | cut -d= -f2)
            # Per-platform skip reasons captured by the audit step (one
            # `reason=<count> <message>` line each). Surfaced below the table
            # whenever a lane skipped, so "all skipped" explains itself.
            reasons=$(grep '^reason=' "$f" | cut -d= -f2-)
            launched=${launched:-unknown}
            # applicable defaults true for older audit files that predate the field.
            applicable=${applicable:-true}
            ok=${ok:-0}
            skip=${skip:-0}
            intentional_skip=${intentional_skip:-0}

            if [ "$ok" -gt 0 ]; then
              status="✅ exercised"
            elif [ "$applicable" = "false" ]; then
              # The quiche QuicHarnessIntegrationTests doesn't run on this lane at all in
              # v6 (Apple = Network.framework backend with no quiche Kotlin target; JS has
              # no QUIC implementation). `ok=0,skip=0` is structural, not a silently
              # all-skipped regression — the platform's QUIC client (if any) is validated
              # elsewhere (see the per-platform reason below). Render ℹ️, never fail.
              status="ℹ️ platform gap (known)"
            elif [ "$skip" -gt 0 ] && [ "$intentional_skip" = "$skip" ]; then
              # Every SKIP came from a platform gate inside withHarness
              # (PR #54 iter 9: Apple K/N is the only one today). Not a
              # regression; tracked separately.
              status="ℹ️ platform gap (known)"
            elif [ "$skip" -gt 0 ]; then
              status="❌ all skipped"
              FAILED=1
            elif [ "$launched" = "true" ]; then
              # Harness was up but no markers reached the log — likely a
              # crash before withHarness's try/catch could fire its
              # println.
              status="❌ no markers despite launch"
              FAILED=1
            else
              status="ℹ️ no data"
            fi

            echo "| $platform | $ok | $skip | $status |" >> "$GITHUB_STEP_SUMMARY"
            echo "platform=$platform launched=$launched applicable=$applicable ok=$ok skip=$skip intentional=$intentional_skip status=$status"

            if [ -n "$reasons" ] && { [ "$skip" -gt 0 ] || [ "$applicable" = "false" ]; }; then
              if [ "$applicable" = "false" ]; then
                detail="$platform — not applicable (known gap)"
              else
                detail="$platform — skip reasons ($skip skipped)"
              fi
              {
                echo ""
                echo "<details><summary>$detail</summary>"
                echo ""
                echo '```'
                echo "$reasons"
                echo '```'
                echo "</details>"
              } >> "$REASONS_OUT"
            fi
          done

          cat "$REASONS_OUT" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "1" ]; then
            {
              echo ""
              echo "❌ **At least one platform's QUIC harness coverage is broken** — every"
              echo "test on that platform silently skipped via the connection-failure catch."
              echo "Fix the harness wireup (port, host, jar build) or the test code that"
              echo "stopped reaching it."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::QUIC interop matrix failed — see step summary"
            exit 1
          fi

  build-windows:
    name: "Windows JVM Tests"
    runs-on: windows-latest
    timeout-minutes: 30
    # needs build-linux for the cross-compiled quiche_jni.dll artifact below.
    needs: build-linux
    # continue-on-error stays during Windows-peer bring-up: the MinGW-cross-
    # compiled DLL has not yet been proven to load on a bare windows-latest
    # (static-libgcc/stdc++ link is the intended fix; CI is the only place to
    # verify it). Drop this once :socket-quic-quiche:jvmTest is green here ≥2 runs —
    # exit criterion per PLAN.md Phase 2 rule 4.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      # The Windows quiche JNI shim is cross-compiled on the Linux job and
      # handed over as the quiche-windows-natives artifact. Drop it where
      # stageQuicheNativeResources expects it (libs/quiche/windows-x64/lib/)
      # so NativeLibLoader can extract quiche_jni.dll from the test classpath.
      #
      # The cross-build is best-effort: editing socket-quic-quiche/src/jni/quiche_jni.c
      # cold-busts the quiche native cache (keyed on its hash), and the fragile
      # MinGW cross-build may then not emit the DLL → no artifact is uploaded
      # (if-no-files-found: ignore). download-artifact errors on a missing
      # artifact, so tolerate it (continue-on-error) and gate the test step on
      # the DLL actually being present. This keeps the job GREEN when the DLL
      # is absent — instead of a permanent cosmetic red on every PR — while
      # still running (and surfacing) the tests whenever the DLL is produced.
      - name: Download Windows quiche native lib
        id: download-dll
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: quiche-windows-natives
          path: socket-quic-quiche/libs/quiche/windows-x64/lib
      - name: Check whether the Windows DLL is present
        id: dll
        shell: bash
        run: |
          if [ -f socket-quic-quiche/libs/quiche/windows-x64/lib/quiche_jni.dll ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "quiche_jni.dll present — running Windows JVM tests."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Windows DLL missing::The Linux MinGW cross-build did not produce quiche_jni.dll (likely a cold native cache after a quiche_jni.c edit). Skipping Windows JVM tests this run."
          fi
      # :jvmTest is the root project's suite. :socket-quic-quiche:jvmTest is now
      # included (was excluded while no Windows native existed): the DLL above
      # plus the windows-x64 entry in nativeLibsByPlatform let it stage + load.
      # The leading colon scopes each task to its project; an unqualified
      # `jvmTest` would match every subproject by name. Runs only when the DLL
      # is present (see above).
      - name: Run JVM tests
        if: steps.dll.outputs.present == 'true'
        run: ./gradlew :jvmTest :socket-quic-quiche:jvmTest --no-configuration-cache

  docs:
    name: "Validate Docs Generation"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json
      - name: Generate API Documentation with Dokka
        run: ./gradlew copyDokkaToDocusaurus
      - name: Install docs dependencies
        working-directory: docs
        run: npm ci
      - name: Build docs site
        working-directory: docs
        run: npm run build
