name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yaml

  build-apple:
    uses: ./.github/workflows/build-apple.yaml

  validate:
    needs: [build-linux, build-apple]
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}

  # Aggregates per-platform QUIC harness coverage into one markdown
  # matrix visible in the workflow run summary. Each platform's audit
  # step uploads a `quic-audit-<platform>` artifact with OK/SKIP counts;
  # this job downloads them all, prints the combined table, and fails
  # if any platform reports OK=0 with SKIP>0 (i.e., the QUIC client
  # silently stopped exercising the harness).
  #
  # Android instrumented tests live in a separate workflow file
  # (android_integration.yaml) and aren't covered here — cross-workflow
  # artifact passing in GHA needs API-level coordination that's out of
  # scope for this phase. The Android job's own audit step writes its
  # summary to its own job page.
  quic-interop-summary:
    name: "QUIC Interop Summary"
    needs: [build-linux, build-apple]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all QUIC audit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: quic-audit-*
          path: /tmp/quic-audit
          merge-multiple: true
          # download-artifact@v8 defaults digest-mismatch to `error`, which aborts the WHOLE download
          # (delivering zero files) when GHA's per-artifact digest check trips on these tiny audit
          # files — reding the summary on every PR. `warn` keeps the files so the summary still runs.
          digest-mismatch: warn
        continue-on-error: true

      - name: Build interop matrix
        run: |
          shopt -s nullglob
          FILES=(/tmp/quic-audit/*.txt)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No QUIC audit artifacts found — every platform audit either"
            echo "didn't upload (continue-on-error path) or this run pre-dates"
            echo "the per-platform audit wireup."
            {
              echo "## QUIC Interop Summary"
              echo ""
              echo "_No audit artifacts uploaded by any platform job._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## QUIC Interop Summary"
            echo ""
            echo "| Platform | OK | SKIP | Status |"
            echo "|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          # Reason <details> blocks are buffered here and flushed AFTER the
          # table — emitting them inside the loop would split the markdown
          # table and break its rendering.
          REASONS_OUT=$(mktemp)
          for f in "${FILES[@]}"; do
            platform=$(grep '^platform=' "$f" | cut -d= -f2)
            launched=$(grep '^launched=' "$f" | cut -d= -f2)
            ok=$(grep '^ok=' "$f" | cut -d= -f2)
            skip=$(grep '^skip=' "$f" | cut -d= -f2)
            intentional_skip=$(grep '^intentional_skip=' "$f" | cut -d= -f2)
            # Per-platform skip reasons captured by the audit step (one
            # `reason=<count> <message>` line each). Surfaced below the table
            # whenever a lane skipped, so "all skipped" explains itself.
            reasons=$(grep '^reason=' "$f" | cut -d= -f2-)
            launched=${launched:-unknown}
            ok=${ok:-0}
            skip=${skip:-0}
            intentional_skip=${intentional_skip:-0}

            if [ "$ok" -gt 0 ]; then
              status="✅ exercised"
            elif [ "$skip" -gt 0 ] && [ "$intentional_skip" = "$skip" ]; then
              # Every SKIP came from a platform gate inside withHarness
              # (PR #54 iter 9: Apple K/N is the only one today). Not a
              # regression; tracked separately.
              status="ℹ️ platform gap (known)"
            elif [ "$skip" -gt 0 ]; then
              status="❌ all skipped"
              FAILED=1
            elif [ "$launched" = "true" ]; then
              # Harness was up but no markers reached the log — likely a
              # crash before withHarness's try/catch could fire its
              # println.
              status="❌ no markers despite launch"
              FAILED=1
            else
              status="ℹ️ no data"
            fi

            echo "| $platform | $ok | $skip | $status |" >> "$GITHUB_STEP_SUMMARY"
            echo "platform=$platform launched=$launched ok=$ok skip=$skip intentional=$intentional_skip status=$status"

            if [ "$skip" -gt 0 ] && [ -n "$reasons" ]; then
              {
                echo ""
                echo "<details><summary>$platform — skip reasons ($skip skipped)</summary>"
                echo ""
                echo '```'
                echo "$reasons"
                echo '```'
                echo "</details>"
              } >> "$REASONS_OUT"
            fi
          done

          cat "$REASONS_OUT" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "1" ]; then
            {
              echo ""
              echo "❌ **At least one platform's QUIC harness coverage is broken** — every"
              echo "test on that platform silently skipped via the connection-failure catch."
              echo "Fix the harness wireup (port, host, jar build) or the test code that"
              echo "stopped reaching it."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::QUIC interop matrix failed — see step summary"
            exit 1
          fi

  # Cross-IMPLEMENTATION QUIC/WebTransport interop: an Apple Network.framework (K/N) stack against a
  # quiche (JVM) stack over localhost, both directions. Every WebTransportTestSuite subclass is
  # same-impl loopback; this is the only lane that exercises the two native QUIC backends against each
  # OTHER. It runs entirely off the pre-built artifacts build-apple uploaded (the macosArm64 NW test
  # .kexe + the quiche-JVM interop jar + the testcerts), so it needs NO Gradle, no Konan/quiche cache,
  # and no recompile — just download + run two short processes (~2-3 min). Streams only (issue #173: NW
  # can't carry a datagram flow + inbound streams together). Mirrors quic-interop-summary's reporting:
  # if: always(), soft downloads (a missing/expired artifact skips, never red-X), and a real interop
  # failure fails the job. macos-latest because it needs both the K/N binary and a JVM with the macOS
  # quiche dylib. See socket-webtransport/scripts/ci-cross-impl-nogradle.sh.
  cross-impl-interop:
    name: "Cross-Impl QUIC Interop (NW <-> quiche)"
    needs: [build-apple]
    if: always()
    # macOS 26 to match build-apple: it runs the prebuilt macosArm64 NW .kexe, whose
    # NW QUIC path is gated @available(macOS 26, *) and is now compiled against the
    # macOS-26 SDK there. The runner that executes it must provide that runtime.
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6 # the orchestration script + committed testcerts (cert.crt/key)

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      # All three downloads are soft: a missing/expired artifact (e.g. build-apple failed) must skip the
      # interop run, not red-X the PR. The run step below detects the absence and exits 0.
      - name: Download NW interop test binary
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: webtransport-macos-test-binary
          path: socket-webtransport/build/bin/macosArm64/debugTest/
          digest-mismatch: warn

      - name: Download quiche interop jar
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: webtransport-interop-jar
          path: socket-webtransport/build/libs/
          digest-mismatch: warn

      - name: Download interop testcerts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: webtransport-interop-testcerts
          path: socket-webtransport/testcerts/
          digest-mismatch: warn

      - name: Run cross-impl interop (both directions, no Gradle)
        id: interop
        continue-on-error: true
        run: |
          set -o pipefail
          KEXE=socket-webtransport/build/bin/macosArm64/debugTest/test.kexe
          JAR=socket-webtransport/build/libs/webtransport-interop.jar
          if [ ! -f "$KEXE" ] || [ ! -f "$JAR" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Cross-impl artifacts unavailable (build-apple upload missing/expired) — skipping."
            exit 0
          fi
          # GHA strips the executable bit off uploaded artifacts.
          chmod +x "$KEXE"
          bash socket-webtransport/scripts/ci-cross-impl-nogradle.sh 2>&1 | tee /tmp/cross-impl-interop.log

      - name: Report cross-impl result into step summary
        if: always()
        run: |
          if [ "${{ steps.interop.outputs.missing }}" = "true" ]; then
            {
              echo "## Cross-Impl QUIC/WebTransport Interop"
              echo ""
              echo "_Skipped — pre-built interop artifacts unavailable this run (build-apple upload missing/expired)._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          RESULT=socket-webtransport/build/wt-interop/cross-impl-result.env
          NW=fail
          QS=fail
          if [ -f "$RESULT" ]; then
            # shellcheck disable=SC1090
            . "$RESULT"
            NW=${nw_server:-fail}
            QS=${quiche_server:-fail}
          fi
          icon() { if [ "$1" = pass ]; then echo "PASS"; else echo "FAIL"; fi; }
          {
            echo "## Cross-Impl QUIC/WebTransport Interop"
            echo ""
            echo "Two native QUIC stacks over localhost, no Gradle (streams only — issue #173)."
            echo ""
            echo "| Direction | Server | Client | Result |"
            echo "|---|---|---|---|"
            echo "| NW -> quiche | NW (Apple K/N) | quiche (JVM) | $(icon "$NW") |"
            echo "| quiche -> NW | quiche (JVM) | NW (Apple K/N) | $(icon "$QS") |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$NW" != pass ] || [ "$QS" != pass ]; then
            echo "::error::Cross-impl interop failed — see step summary / the cross-impl-interop-log artifact"
            exit 1
          fi

      - name: Upload cross-impl interop logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cross-impl-interop-log
          path: |
            /tmp/cross-impl-interop.log
            socket-webtransport/build/wt-interop/*-server.log
          retention-days: 3
          if-no-files-found: ignore

  build-windows:
    name: "Windows JVM Tests"
    runs-on: windows-latest
    timeout-minutes: 30
    # needs build-linux for the cross-compiled quiche_jni.dll artifact below.
    needs: build-linux
    # continue-on-error stays during Windows-peer bring-up: the MinGW-cross-
    # compiled DLL has not yet been proven to load on a bare windows-latest
    # (static-libgcc/stdc++ link is the intended fix; CI is the only place to
    # verify it). Drop this once :socket-quic-quiche:jvmTest is green here ≥2 runs —
    # exit criterion per PLAN.md Phase 2 rule 4.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      # The Windows quiche JNI shim is cross-compiled on the Linux job and
      # handed over as the quiche-windows-natives artifact. Drop it where
      # stageQuicheNativeResources expects it (libs/quiche/windows-x64/lib/)
      # so NativeLibLoader can extract quiche_jni.dll from the test classpath.
      #
      # The cross-build is best-effort: editing socket-quic-quiche/src/jni/quiche_jni.c
      # cold-busts the quiche native cache (keyed on its hash), and the fragile
      # MinGW cross-build may then not emit the DLL → no artifact is uploaded
      # (if-no-files-found: ignore). download-artifact errors on a missing
      # artifact, so tolerate it (continue-on-error) and gate the test step on
      # the DLL actually being present. This keeps the job GREEN when the DLL
      # is absent — instead of a permanent cosmetic red on every PR — while
      # still running (and surfacing) the tests whenever the DLL is produced.
      - name: Download Windows quiche native lib
        id: download-dll
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: quiche-windows-natives
          path: socket-quic-quiche/libs/quiche/windows-x64/lib
      - name: Check whether the Windows DLL is present
        id: dll
        shell: bash
        run: |
          if [ -f socket-quic-quiche/libs/quiche/windows-x64/lib/quiche_jni.dll ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "quiche_jni.dll present — running Windows JVM tests."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Windows DLL missing::The Linux MinGW cross-build did not produce quiche_jni.dll (likely a cold native cache after a quiche_jni.c edit). Skipping Windows JVM tests this run."
          fi
      # :jvmTest is the root project's suite. :socket-quic-quiche:jvmTest is now
      # included (was excluded while no Windows native existed): the DLL above
      # plus the windows-x64 entry in nativeLibsByPlatform let it stage + load.
      # The leading colon scopes each task to its project; an unqualified
      # `jvmTest` would match every subproject by name. Runs only when the DLL
      # is present (see above).
      - name: Run JVM tests
        if: steps.dll.outputs.present == 'true'
        run: ./gradlew :jvmTest :socket-quic-quiche:jvmTest --no-configuration-cache

  docs:
    name: "Validate Docs Generation"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json
      - name: Generate API Documentation with Dokka
        run: ./gradlew copyDokkaToDocusaurus
      - name: Install docs dependencies
        working-directory: docs
        run: npm ci
      - name: Build docs site
        working-directory: docs
        run: npm run build
