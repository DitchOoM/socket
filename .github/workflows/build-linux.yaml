name: "Build & Test (Linux)"

on:
  workflow_call:
    inputs:
      gradle-args:
        description: "Extra Gradle arguments (e.g., -PincrementMinor=true)"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "Computed next version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: "Linux / JVM / JS / Android"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Every jvmTest worker in this job mirrors its JVM fatal-error log (hs_err) to
    # stderr so a native crash (the intermittent JNI SIGABRT) is fully visible in
    # the live job log, not just an opaque exit 134. See socket-quic-quiche/build.gradle.kts.
    env:
      ORG_GRADLE_PROJECT_quicCrashDiag: "1"
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      # Install both 17 and 21. The build/toolchain runs on 21 (the last entry
      # becomes the default JAVA_HOME) — required to compile the FFM bindings —
      # while JDK 17 (exposed as JAVA_HOME_17_X64) lets the "JDK 17 / JNI" test
      # step below run :socket-quic-quiche:jvmTest on a JDK < 21 launcher.
      - name: Set up JDKs (17 + 21)
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: |
            17
            21
          cache: gradle

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      # accept-android-sdk-licenses is DISABLED here on purpose. The action's
      # built-in license pass (`sdkmanager --licenses`, run when this input is
      # true) doesn't just write license files — after accepting, sdkmanager
      # *completes* the runner image's pending Android Emulator package, which
      # downloads + unzips it from dl.google.com. That download intermittently
      # arrives truncated, so sdkmanager aborts with
      #   "Error reading Zip content from a SeekableByteChannel" -> exit 1
      # and the action has no retry, reddening the whole build-linux lane for a
      # transient network glitch (run 27561470552 attempt 1, step "Setup Android
      # SDK"). The package-install loop below (`tools platform-tools`) still
      # auto-accepts each package's own license via the action's stdin handler,
      # so the only thing deferred is the standalone all-licenses pass — which we
      # re-run with retry in the next step.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: false

      # Accept the remaining SDK licenses with retry. `sdkmanager --licenses`
      # is idempotent and the emulator-package prep it triggers is exactly the
      # transient dl.google.com download that flakes above, so retry it with
      # backoff — same model as test-harness/compose-up-retry.sh absorbing
      # transient Docker Hub pulls. Finite `printf` of 'y' lines (not `yes |`,
      # which would hand pipefail a SIGPIPE 141 from the killed generator and
      # mask sdkmanager's real exit code) feeds the prompts.
      - name: Accept Android SDK licenses (retry transient package prep)
        run: |
          attempts=3
          for i in $(seq 1 "$attempts"); do
            if printf 'y\n%.0s' $(seq 1 50) | sdkmanager --licenses; then
              exit 0
            fi
            if [ "$i" -lt "$attempts" ]; then
              backoff=$((i * 15))
              echo "::warning::'sdkmanager --licenses' failed (attempt $i/$attempts) — likely a transient dl.google.com package-download corruption; retrying in ${backoff}s"
              sleep "$backoff"
            fi
          done
          echo "::error::Android SDK license acceptance failed after $attempts attempts"
          exit 1

      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-linux-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-linux-

      - name: Cache BoringSSL x64
        uses: actions/cache@v5
        with:
          path: libs/boringssl/linux-x64
          key: boringssl-linux-x64-v4-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache BoringSSL ARM64
        uses: actions/cache@v5
        with:
          path: libs/boringssl/linux-arm64
          key: boringssl-linux-arm64-v4-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache OpenSSL x64 (legacy fallback)
        uses: actions/cache@v5
        with:
          path: libs/openssl/linux-x64
          key: openssl-linux-x64-v5-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache OpenSSL ARM64 (legacy fallback)
        uses: actions/cache@v5
        with:
          path: libs/openssl/linux-arm64
          key: openssl-linux-arm64-v5-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache liburing x64
        uses: actions/cache@v5
        with:
          path: libs/liburing/linux-x64
          key: liburing-linux-x64-v1-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache liburing ARM64
        uses: actions/cache@v5
        with:
          path: libs/liburing/linux-arm64
          key: liburing-linux-arm64-v1-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl pkg-config cmake nasm
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Desktop cross targets + all four Android NDK targets. The Android targets
      # are needed by :socket-quic-quiche:buildAndroidJni* (cargo-ndk), which Gradle
      # transitively invokes from :socket-quic-quiche:linkDebugTestLinuxArm64 /
      # publishToMavenLocal even though this job runs on x64. Installing them
      # here (instead of leaving cargo-ndk to fail later inside the continue-
      # on-error \"Build quiche\" step) keeps the JNI build deterministic.
      - name: Add Rust cross-compile targets
        run: |
          rustup target add aarch64-unknown-linux-gnu x86_64-pc-windows-gnu \
              aarch64-linux-android armv7-linux-androideabi \
              x86_64-linux-android i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --quiet

      # Combined quiche + JNI shim cache — shims now live under
      # socket-quic-quiche/libs/quiche/<platform>/lib/ alongside libquiche.{so,a},
      # matching the local-dev path (createBuildQuicheSharedTask +
      # buildJvmJniShim*), so a single platform dir covers both outputs.
      # Hash quiche_jni.c too so shim edits invalidate the cache.
      - name: Cache quiche Linux x64
        uses: actions/cache@v5
        with:
          path: socket-quic-quiche/libs/quiche/linux-x64
          key: quiche-linux-x64-v6-${{ hashFiles('gradle/libs.versions.toml', 'socket-quic-quiche/src/jni/quiche_jni.c') }}

      - name: Cache quiche Linux ARM64
        uses: actions/cache@v5
        with:
          path: socket-quic-quiche/libs/quiche/linux-arm64
          key: quiche-linux-arm64-v6-${{ hashFiles('gradle/libs.versions.toml', 'socket-quic-quiche/src/jni/quiche_jni.c') }}

      # Cache the cargo target/ trees for all four quiche cross-compile
      # targets (Linux x64, Linux arm64, Windows x64, Android arm64). The
      # existing `Cache quiche Linux x64/arm64` entries above only preserve
      # the FINAL JNI shim outputs under socket-quic-quiche/libs/quiche/<platform>/
      # lib/ — they don't cover cargo's intermediate target/<triple>/release/
      # where libquiche.a is built. Without this, even on full cache-hit the
      # "Build quiche native libs" shell step unconditionally invokes cargo
      # for all four targets, recompiling the whole quiche crate from scratch
      # (~3-5 min × 4 targets). With target/ cached, cargo sees fingerprints
      # match and the build is near-instant. Also preserves the cloned quiche
      # source itself (saves ~5-30s git clone). Key includes the JNI shim
      # source hash so the cache invalidates on either change.
      # restore-keys gives a partial-hit on version bumps so cargo incremental
      # recompile picks up from the previous build instead of from zero.
      - name: Cache quiche cargo target/ (all triples)
        uses: actions/cache@v5
        with:
          path: socket-quic-quiche/build/quiche
          key: quiche-cargo-target-v1-${{ hashFiles('gradle/libs.versions.toml', 'socket-quic-quiche/src/jni/quiche_jni.c') }}
          restore-keys: quiche-cargo-target-v1-

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Get version
        id: version
        run: echo "version=$(./gradlew -q nextVersion ${{ inputs.gradle-args }})" >> $GITHUB_OUTPUT

      - name: Build BoringSSL (shared with quiche)
        run: ./gradlew :buildBoringsslX64 :buildBoringsslArm64 --no-configuration-cache

      - name: Build quiche native libs (all platforms from Linux)
        continue-on-error: true
        run: |
          set -e
          WS="${{ github.workspace }}"
          JNI_SRC="$WS/socket-quic-quiche/src/jni/quiche_jni.c"
          QUICHE_H="$WS/socket-quic-quiche/libs/quiche/include"
          # JNI shims go next to libquiche.{so,a} under libs/quiche/<platform>/lib/
          # so the Gradle classifier-JAR pipeline (jvmNativesJar*) and jvmTest
          # stager pick them up from the same place local dev writes them.
          QUICHE_LIBS="$WS/socket-quic-quiche/libs/quiche"
          ANDROID_JNI="$WS/socket-quic-quiche/src/androidMain/jniLibs"

          # Build quiche static (Linux K/Native) + shared (Linux JVM)
          ./gradlew :socket-quic-quiche:buildQuicheStaticX64 :socket-quic-quiche:buildQuicheStaticArm64 :socket-quic-quiche:buildQuicheSharedLinuxX64 --no-configuration-cache || true

          # Ensure quiche source exists for JNI builds (Gradle may skip download on cache hit)
          QUICHE_DIR=$(find socket-quic-quiche/build/quiche -maxdepth 1 -name "quiche-*" -type d 2>/dev/null | head -1)
          if [ -z "$QUICHE_DIR" ]; then
            QUICHE_DIR="/tmp/quiche-src"
            git clone --recursive --depth 1 --branch 0.28.0 \
              https://github.com/cloudflare/quiche.git "$QUICHE_DIR"
          fi

          build_jni() {
            local TARGET=$1 CC=$2 STRIP=$3 DEST=$4 NAME=$5 EXTRA_LIBS=$6 BSSL_DIR=$7
            local LIB=$(find "$QUICHE_DIR/target/$TARGET/release" -name "libquiche.a" 2>/dev/null | head -1)
            [ -z "$LIB" ] && echo "No libquiche.a for $TARGET" && return
            # Collect all static libs to link (quiche + BoringSSL if separate)
            local ARCHIVES="$LIB"
            if [ -n "$BSSL_DIR" ] && [ -f "$BSSL_DIR/lib/libcrypto.a" ]; then
              ARCHIVES="$ARCHIVES $BSSL_DIR/lib/libcrypto.a $BSSL_DIR/lib/libssl.a"
            fi
            mkdir -p "$DEST"
            # -fno-omit-frame-pointer: keep the frame pointer so a JVM hs_err / core backtrace can
            # unwind through the JNI shim (the JVM's native stack walker doesn't use DWARF CFI). This
            # is the CI counterpart of the gradle buildJvmJniShim task — CI builds the shim HERE, not
            # via that task, so symbolication has to be applied in both places.
            $CC -shared -fPIC -fno-omit-frame-pointer -Wall \
              -o "$DEST/$NAME" "$JNI_SRC" \
              -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux \
              -I"$QUICHE_H" \
              -Wl,--whole-archive $ARCHIVES -Wl,--no-whole-archive \
              -Wl,--allow-multiple-definition \
              -lpthread -ldl -lm -lstdc++ $EXTRA_LIBS \
              && $STRIP "$DEST/$NAME" \
              && echo "Built $DEST/$NAME ($(du -h "$DEST/$NAME" | cut -f1))"
          }

          # Linux x64 JNI shim
          echo "=== Linux x64 JNI ==="
          BSSL="$WS/libs/boringssl/linux-x64"
          QUICHE_BSSL_PATH=$BSSL cargo build --release --package quiche \
            --target x86_64-unknown-linux-gnu --no-default-features --features ffi \
            --manifest-path "$QUICHE_DIR/Cargo.toml" 2>/dev/null || true
          # --strip-debug (NOT --strip-all): drop DWARF to keep the lib small but KEEP the .symtab
          # function names, so a native crash backtrace reads `...(Java_..._nConnRecv+0x..)` instead of
          # a bare `libquiche_jni.so+0xNNNN`. Matches socket-quic-quiche/build.gradle.kts.
          build_jni "x86_64-unknown-linux-gnu" "gcc" "strip --strip-debug" "$QUICHE_LIBS/linux-x64/lib" "libquiche_jni.so" "" "$BSSL"

          # Linux arm64 JNI shim
          echo "=== Linux arm64 JNI ==="
          BSSL_ARM="$WS/libs/boringssl/linux-arm64"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
          QUICHE_BSSL_PATH=$BSSL_ARM cargo build --release --package quiche \
            --target aarch64-unknown-linux-gnu --no-default-features --features ffi \
            --manifest-path "$QUICHE_DIR/Cargo.toml" 2>/dev/null || true
          build_jni "aarch64-unknown-linux-gnu" "aarch64-linux-gnu-gcc" "aarch64-linux-gnu-strip --strip-debug" "$QUICHE_LIBS/linux-arm64/lib" "libquiche_jni.so" "" "$BSSL_ARM"

          # Windows x64 JNI shim (cross-compile via MinGW)
          echo "=== Windows x64 JNI ==="
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
            cargo build --release --package quiche \
            --target x86_64-pc-windows-gnu --no-default-features --features ffi,boringssl-vendored \
            --manifest-path "$QUICHE_DIR/Cargo.toml" 2>/dev/null || true
          WIN_LIB=$(find "$QUICHE_DIR/target/x86_64-pc-windows-gnu/release" -name "libquiche.a" 2>/dev/null | head -1)
          if [ -n "$WIN_LIB" ]; then
            mkdir -p "$QUICHE_LIBS/windows-x64/lib"
            x86_64-w64-mingw32-gcc -shared -Wall \
              -static-libgcc -static-libstdc++ \
              -o "$QUICHE_LIBS/windows-x64/lib/quiche_jni.dll" "$JNI_SRC" \
              -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux \
              -I"$QUICHE_H" \
              -Wl,--whole-archive "$WIN_LIB" -Wl,--no-whole-archive \
              -lws2_32 -lcrypt32 -lntdll -luserenv -lbcrypt -lm \
              -Wl,-Bstatic -lstdc++ -lpthread -Wl,-Bdynamic \
              && x86_64-w64-mingw32-strip --strip-all "$QUICHE_LIBS/windows-x64/lib/quiche_jni.dll" \
              && echo "Built Windows x64: $(du -h "$QUICHE_LIBS/windows-x64/lib/quiche_jni.dll" | cut -f1)"
          fi

          # Android arm64 JNI shim (via cargo-ndk)
          echo "=== Android arm64 JNI ==="
          if command -v cargo-ndk &>/dev/null && [ -d "$ANDROID_NDK_HOME" ]; then
            cargo ndk --target arm64-v8a --platform 24 -- build --release --package quiche \
              --no-default-features --features ffi,boringssl-vendored \
              --manifest-path "$QUICHE_DIR/Cargo.toml" 2>/dev/null || true
            NDK_CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
            NDK_STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
            AND_LIB=$(find "$QUICHE_DIR/target/aarch64-linux-android/release" -name "libquiche.a" 2>/dev/null | head -1)
            if [ -n "$AND_LIB" ]; then
              mkdir -p "$ANDROID_JNI/arm64-v8a"
              $NDK_CC -shared -fPIC -Wall \
                -o "$ANDROID_JNI/arm64-v8a/libquiche_jni.so" "$JNI_SRC" \
                -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux \
                -I"$QUICHE_H" \
                -Wl,--whole-archive "$AND_LIB" -Wl,--no-whole-archive \
                -lm -ldl -llog \
                && $NDK_STRIP --strip-all "$ANDROID_JNI/arm64-v8a/libquiche_jni.so" \
                && echo "Built Android arm64: $(du -h "$ANDROID_JNI/arm64-v8a/libquiche_jni.so" | cut -f1)"
            fi
          fi

          echo "=== Done ==="
          find "$QUICHE_LIBS" "$ANDROID_JNI" -name "*.so" -o -name "*.dll" -o -name "*.dylib" 2>/dev/null

      - name: Verify JNI shims exist
        run: |
          echo "=== JVM native libs ==="
          find socket-quic-quiche/libs/quiche -name "libquiche_jni.*" -o -name "quiche_jni.dll" 2>/dev/null || echo "WARN: no JNI shims found"
          echo "=== Android native libs ==="
          find socket-quic-quiche/src/androidMain/jniLibs -type f 2>/dev/null || echo "No Android JNI (expected on Linux)"

      # Harness-backed tests use the in-repo Docker stack (`docker compose up`
      # is wired via Gradle's harnessUp/harnessDown tasks). The TLS server
      # certs are generated by this script; we inject the harness root CA into
      # both the OS trust store (BoringSSL/K-N read /etc/ssl/certs) and the JVM
      # keystore (JSSE reads $JAVA_HOME/lib/security/cacerts) so tlsDefault()
      # accepts the harness cert chain.
      - name: Generate harness TLS certs
        run: bash test-harness/tls/gen-certs.sh

      - name: Trust harness CA (Linux)
        run: |
          sudo cp test-harness/tls/certs/ca.crt /usr/local/share/ca-certificates/harness-root.crt
          sudo update-ca-certificates

      - name: Trust harness CA in JVM keystore (Linux)
        run: |
          sudo keytool -delete -alias harness-root \
              -keystore "$JAVA_HOME/lib/security/cacerts" \
              -storepass changeit 2>/dev/null || true
          sudo keytool -importcert -trustcacerts \
              -file test-harness/tls/certs/ca.crt \
              -alias harness-root \
              -keystore "$JAVA_HOME/lib/security/cacerts" \
              -storepass changeit -noprompt

      # Build the quic-echo fat jar with BOTH linux-x64 AND linux-arm64 quiche
      # natives baked in (gated by -PquicEchoAllArches=true). Done explicitly
      # here so `harnessUp` downstream sees an up-to-date multi-arch jar and
      # skips its own quicEchoJar dependency rebuild. The same jar then runs
      # under both the linux-x64 and linux-arm64 manifests of the
      # eclipse-temurin:21-jre-noble base image — required to bring quic-echo
      # up on the Linux ARM64 (native) job (Phase 3) out of the same artifact.
      # The cross-build uses aarch64-linux-gnu-gcc + the cargo arm64 target
      # that this job already has installed for the K/Native ARM64 chain.
      - name: Build multi-arch quic-echo fat jar
        run: >-
          ./gradlew :socket-quic-quiche:quicEchoJar -PquicEchoAllArches=true
          --no-configuration-cache ${{ inputs.gradle-args }}

      # NOTE: :jsTest above is the ROOT project's JS suite. :socket-quic:jsNodeTest
      # is a SEPARATE task (the socket-quic module's common QUIC suite + JS gap
      # tests, running on Node) that was never wired in — so Node QUIC went
      # entirely unvalidated in CI (#74 Task 2). It needs no native quiche (the
      # JS impls are documented placeholders that throw), so it just rides the
      # Node already on this runner. Browser/wasmJs stay out (no raw UDP / lower
      # priority per #74).
      # :socket-http3 is a pure-Kotlin HTTP/3 layer on :socket-quic. Its deterministic
      # codec/connection suite + the in-process loopback run on jvm, jsNode, and linuxX64
      # (the live interop GET self-skips when the endpoint is unreachable). Wiring these
      # here keeps the published socket-http3 artifact gatekept by CI — otherwise the module
      # would publish (root publishToMavenLocal includes it) but go entirely unvalidated,
      # the same gap #74/#76 fixed for socket-quic's JS suite.
      # Start the third-party HTTP/3 + WebTransport server (aioquic + lsqpack, built from
      # socket-http3/docker-interop) so the foreign-stack interop tests bundled in :socket-http3:jvmTest
      # below — Http3DockerInteropTests (QPACK eviction) and WebTransportDockerInteropTests (WT bidi
      # echo) — actually RUN instead of self-skipping on an unreachable 127.0.0.1:4433. These are our
      # ONLY checks against a foreign stack: the in-process loopback round-trips our client through our
      # OWN server, so a bug symmetric across both halves would hide. `start` is detached and blocks
      # until the server logs it is serving, so the tests have a provably-up peer. A build/start failure
      # fails the job on purpose — the alternative (silently skipping) is exactly the gap this closes.
      - name: Start HTTP/3 + WebTransport interop server (aioquic)
        run: socket-http3/docker-interop/run-server.sh start

      - name: Run checks and tests
        run: >-
          ./gradlew :jvmTest :jsTest :linuxX64Test :testDebugUnitTest :ktlintCheck
          :socket-quic:jsNodeTest
          :socket-quic-quiche:jvmProcessResources
          :socket-quic:ktlintCheck :socket-quic-quiche:ktlintCheck :socket-quic-default:ktlintCheck
          :socket-http3:jvmTest :socket-http3:jsNodeTest :socket-http3:linuxX64Test
          :socket-http3:testDebugUnitTest :socket-http3:ktlintCheck
          -PquicEchoAllArches=true
          --no-configuration-cache ${{ inputs.gradle-args }}

      - name: Stop HTTP/3 QPACK interop server
        if: always()
        run: socket-http3/docker-interop/run-server.sh stop

      # The quiche_conn_recv SIGABRT that previously required continue-on-error
      # was a JVM-side sockaddr lifetime bug (DirectByteBuffer Cleaner freeing
      # the buffer that quiche_recv_info held a raw pointer to); fixed in 5e55a5f.
      # The K/Native side was fixed earlier in b0a4f99. Both steps now run as
      # hard requirements — a real test failure should fail the job.
      #
      # timeout-minutes: 8 caps a single hanging socket-quic test at 8min so it
      # can't burn the 60-min job timeout and wipe subsequent steps. On run
      # 26467344275 step 29 hung 53min on QuicLocalServerTests.serverAcceptsConnection
      # before this guard existed; normal duration is ~30-60s, so 8min is
      # ~8-16x headroom for the slowest legitimate flake. 9 alphabetically-late
      # tests still skip on CI via assumeTrue gates (see HANDOFF.md / TODO.md
      # for the resource-pressure root-cause story).
      # --continue: without it, the first hanging test (typically
      # bidirectionalStreamMuxExchange, alphabetically Q-ordered, currently re-
      # gated) halts the whole task before the alphabetically-later tests run,
      # which means each push only reveals one failure at a time. With
      # --continue, every failing test gets to execute and report so we see the
      # full failure surface in one CI cycle. Combined with the test-reports
      # artifact upload below, this gives complete signal per run.
      # The default jvmTest run exercises the JNI backend on JDK 21 (loadQuicheApi()
      # resolves to the base commonJvmMain loader — the java21/FFM output is not on
      # the Test classpath). QUIC_MIGRATION_REQUIRE_RUN=1 turns a clean skip of
      # QuicMigrationLoopbackTests into a hard failure here, where the native is
      # built fresh and 127.0.0.2 is bindable, so a broken native can't pass as green.
      - name: Run socket-quic-quiche JVM tests
        timeout-minutes: 8
        env:
          QUIC_MIGRATION_REQUIRE_RUN: "1"
        run: |
          # This is the lane where the intermittent JNI SIGSEGV (recv_info UAF) was first caught, so
          # capture a core here too — not just on the malloc-check lane. The forked worker inherits this
          # shell's core ulimit, so raise it and run --no-daemon (a daemon reused from an earlier step
          # would carry core size 0). core_pattern is machine-wide; the post-mortem step reads /tmp/cores.
          ulimit -c unlimited
          sudo mkdir -p /tmp/cores && sudo chmod 1777 /tmp/cores
          echo '/tmp/cores/core.%e.%p' | sudo tee /proc/sys/kernel/core_pattern >/dev/null
          ./gradlew :socket-quic-quiche:jvmTest --continue --no-daemon \
            --no-configuration-cache ${{ inputs.gradle-args }}

      # Same suite on the FFM backend. -PquicheJvmBackend=ffm prepends the java21
      # (FFM) output so its loader shadows the base JNI one, then loads the
      # self-contained shim via Panama. This is the only CI run that exercises
      # FfmQuicheApi — including the FFM migration path (the in-repo FFM server +
      # client), which had a SIGSEGV that the old silent JNI fallback hid.
      #
      # `if: !cancelled()` so this runs even when the default (JNI) step above
      # crashed: the two backends are independent and a native abort in one must
      # not blind us to the other. Without it, an intermittent JNI SIGABRT skips
      # the entire FFM run, so we never learn whether the crash is JNI-only.
      - name: Run socket-quic-quiche JVM tests (FFM backend)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        env:
          QUIC_MIGRATION_REQUIRE_RUN: "1"
        run: >-
          ./gradlew :socket-quic-quiche:jvmTest -PquicheJvmBackend=ffm --continue
          --no-configuration-cache ${{ inputs.gradle-args }}

      # JNI backend on a JDK 17 launcher (the runtime Android / legacy-JVM
      # consumers actually use). The build/toolchain stays on 21; only this Test
      # task runs on 17, found via the JAVA_HOME_17_X64 install from setup-java.
      # The java21/FFM classes aren't on the JNI classpath, so there is no
      # UnsupportedClassVersionError. Proves connNewScid + sockaddr decode +
      # server routing on the JNI shim at runtime on JDK < 21.
      #
      # `if: !cancelled()` for the same reason as the FFM step: independent of an
      # earlier backend's crash, so all three backend runs always report.
      - name: Run socket-quic-quiche JVM tests (JDK 17 / JNI)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        env:
          QUIC_MIGRATION_REQUIRE_RUN: "1"
        run: >-
          ./gradlew :socket-quic-quiche:jvmTest -PjvmTestLauncher=17 --continue
          -Porg.gradle.java.installations.fromEnv=JAVA_HOME_17_X64
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Snapshot the JVM QuicHarnessIntegrationTests OK/SKIP markers BEFORE the
      # malloc-check step below re-runs :socket-quic-quiche:jvmTest with only a handful
      # of classes — that rerun OVERWRITES test-results/jvmTest, erasing the
      # harness markers the audit needs (this is what made the audit read ok=0
      # and falsely report "all skipped"). Snapshot the jvmTest dir ONLY, so the
      # Node/JS "platform unsupported" skips written earlier by :jsNodeTest can't
      # be miscounted into the JVM lane. Captures the JDK17 backend run (the last
      # full jvmTest); all three JVM backends hit the same live harness, so its
      # outcome represents the JVM client. `!cancelled()` mirrors the test steps.
      - name: Snapshot JVM QUIC harness markers (pre-malloc-check)
        if: ${{ !cancelled() }}
        run: |
          grep -rhoE 'harness (OK|SKIP: [^<&]+)' \
            socket-quic-quiche/build/test-results/jvmTest 2>/dev/null \
            > /tmp/quic-harness-jvm.log || true
          echo "snapshotted $(wc -l < /tmp/quic-harness-jvm.log 2>/dev/null || echo 0) JVM harness markers"

      # Heap-corruption / UAF guard. The worst QUIC bug class (the 3.2.12 JNI
      # stream-command use-after-free that corrupted the glibc free-list) only
      # reproduces under glibc's malloc consistency checks — NOT ASAN, because
      # libquiche.a is non-instrumented. `-PquicMallocCheck` sets MALLOC_CHECK_=3
      # + MALLOC_PERTURB_ + glibc.malloc.check=3 on the forked test worker (see
      # socket-quic-quiche/build.gradle.kts). We re-run only the recv-path robustness +
      # concurrency-soak suites (the allocation-heavy native paths) so a
      # regression aborts the JVM with a diagnostic instead of silently
      # corrupting state. `if: !cancelled()` so a crash in an earlier backend
      # step doesn't skip this independent check.
      #
      # StaleConnectionDiagnosticTests is included because the still-open
      # intermittent JNI SIGABRT (exit 134, no failing JUnit case) was last seen
      # *near* it — a connection-teardown-heavy suite (server driver destroy +
      # connectionsByDcid cleanup + health-check connections timing out). Running
      # it here means the next recurrence aborts under malloc-check with a
      # corrupted-block diagnostic, instead of an opaque low-rate exit 134.
      - name: Run socket-quic-quiche recv-path + soak + teardown suites under glibc malloc check
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        env:
          QUIC_MIGRATION_REQUIRE_RUN: "1"
        run: |
          # Capture a full core dump if a native UAF aborts the test worker, so the
          # next JNI SIGABRT can be post-mortem'd in gdb instead of guessed. The
          # forked worker inherits THIS shell's core ulimit, so raise it here and run
          # --no-daemon (a daemon reused from an earlier step would carry core size 0).
          # core_pattern is machine-wide; the post-mortem step below reads /tmp/cores.
          ulimit -c unlimited
          sudo mkdir -p /tmp/cores && sudo chmod 1777 /tmp/cores
          echo '/tmp/cores/core.%e.%p' | sudo tee /proc/sys/kernel/core_pattern >/dev/null
          ./gradlew :socket-quic-quiche:jvmTest -PquicMallocCheck --continue --no-daemon \
            --tests "com.ditchoom.socket.quic.QuicMalformedPacketTests" \
            --tests "com.ditchoom.socket.quic.QuicConcurrencySoakTests" \
            --tests "com.ditchoom.socket.quic.StaleConnectionDiagnosticTests" \
            --no-configuration-cache ${{ inputs.gradle-args }}

      # Coverage-guided fuzzing of quiche_header_info (the parse on every
      # received datagram, before any connection state). Time-boxed so it's a
      # gating signal, not an open-ended job: libFuzzer's signal handlers turn a
      # native SIGSEGV/SIGABRT into a `crash-*` repro under build/fuzz, which the
      # upload step below captures. A find fails the job. The committed seed
      # corpus (socket-quic-quiche/fuzz/corpus) starts it warm. `if: !cancelled()` for
      # the same independence reason as the malloc-check step.
      - name: Fuzz quiche_header_info (Jazzer, time-boxed)
        if: ${{ !cancelled() }}
        timeout-minutes: 6
        run: >-
          ./gradlew :socket-quic-quiche:quicHeaderFuzz -PquicFuzzSeconds=180
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Native ASAN + coverage-guided lane: cargo-fuzz builds quiche with
      # SanitizerCoverage + AddressSanitizer, so libFuzzer gets REAL edge
      # coverage of the parser (the JVM lane above plateaus — it can't
      # instrument native quiche) and ASAN catches the heap-overflow / UAF
      # class. nightly + cargo-fuzz are installed here only (opt-in locally).
      # Time-boxed and gating like the Jazzer lane; an ASAN fault / crash fails
      # the job and its repro is uploaded below. `if: !cancelled()` for the
      # same independence reason.
      - name: Install nightly Rust + cargo-fuzz
        if: ${{ !cancelled() }}
        run: |
          rustup toolchain install nightly --profile minimal
          cargo install cargo-fuzz --locked
      - name: Fuzz quiche::Header::from_slice (cargo-fuzz ASAN, time-boxed)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        run: >-
          ./gradlew :socket-quic-quiche:quicHeaderFuzzNative -PquicFuzzSeconds=180
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Deeper target: the full server packet-recv state machine (accept + Connection::recv),
      # not just the public-header parse — ~5x the edge coverage locally (cov 835 vs 162). Same
      # ASAN/gating model. This lane runs Rust-ASAN only; the BoringSSL-C ASAN path is proven in
      # the separate, non-gating step below before it's promoted onto this gating lane.
      - name: Fuzz quiche server recv path (cargo-fuzz ASAN, time-boxed)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        run: >-
          ./gradlew :socket-quic-quiche:quicConnRecvFuzzNative -PquicFuzzSeconds=180
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Prove the BoringSSL-C ASAN path (-PquicFuzzBoringSslAsan) actually instruments BoringSSL, not
      # just quiche's Rust. clang is required: its LLVM ASAN runtime must match cargo-fuzz's; gcc's
      # libasan can't coexist with it in one binary. The author added the wiring without a clang host
      # to verify it, so this step IS the verification.
      #
      # continue-on-error during bring-up (same convention as the build-windows job): the clang/Rust
      # ASAN-runtime match is unproven, so a red here must not block PRs. Drop continue-on-error once
      # green >=2 runs, then move -PquicFuzzBoringSslAsan onto the conn_recv lane above.
      - name: Install clang (for BoringSSL ASAN)
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Prove BoringSSL-C ASAN instrumentation (clang, time-boxed)
        if: ${{ !cancelled() }}
        continue-on-error: true
        timeout-minutes: 15
        run: |
          set -euo pipefail
          # Force a clean fuzz build so BoringSSL is recompiled with the ASAN CFLAGS (not served from a
          # prior uninstrumented cache) — otherwise the proof below could read a stale archive.
          rm -rf socket-quic-quiche/fuzz/native/target
          # Build + run conn_recv with BoringSSL ASAN on. A clang/Rust ASAN-runtime mismatch would fail
          # at link or first execution here, so a clean run already proves the instrumented binary works.
          ./gradlew :socket-quic-quiche:quicConnRecvFuzzNative -PquicFuzzBoringSslAsan -PquicFuzzSeconds=90 \
            --no-configuration-cache ${{ inputs.gradle-args }}
          # Now prove BoringSSL ITSELF is ASAN-instrumented: its compiled archive must reference ASAN
          # interceptors. An uninstrumented BoringSSL has zero __asan_ symbols, so no match => the CFLAGS
          # never reached the C build (ASAN would cover only quiche's Rust) and we fail loudly.
          bssl=$(find socket-quic-quiche/fuzz/native/target \( -name 'libcrypto.a' -o -name 'libssl.a' \) | head -1)
          if [ -z "$bssl" ]; then echo "::error::no BoringSSL archive found under the fuzz target dir"; exit 1; fi
          echo "Inspecting $bssl"
          if nm "$bssl" 2>/dev/null | grep -q '__asan_'; then
            echo "PROVEN: BoringSSL is ASAN-instrumented (__asan_ symbols present in $bssl)"
          else
            echo "::error::BoringSSL archive has NO __asan_ symbols — CFLAGS did not propagate to the C build; ASAN covers quiche's Rust only"
            exit 1
          fi

      - name: Upload fuzzing crash repros
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: quic-header-fuzz-crashes
          path: |
            socket-quic-quiche/build/fuzz/header-info/crash-*
            socket-quic-quiche/build/fuzz/header-info/oom-*
            socket-quic-quiche/build/fuzz/header-info/timeout-*
            socket-quic-quiche/fuzz/native/artifacts/**
          if-no-files-found: ignore

      # Audit step: mirror the macOS + Linux ARM64 audits — count
      # `harness OK` / `harness SKIP` markers in the JUnit XML's
      # <system-out> blocks and surface in step summary + artifact.
      # On Linux x64 the harness is always brought up by `harnessUp`
      # so OK > 0 is expected. The audit catches regressions where the
      # setup quietly stops working (port mismatch, broken native, etc.)
      # — same observability pattern uniformly across platforms.
      - name: Audit QUIC harness coverage on Linux x64 JVM
        if: always()
        continue-on-error: true
        run: |
          # Read the pre-malloc-check JVM-only snapshot (see the snapshot step
          # above), NOT the live test-results tree: scoped to jvmTest so the
          # Node/JS "platform unsupported" skips never count here, and immune to
          # the malloc-check rerun overwriting test-results/jvmTest. The snapshot
          # already holds one marker per line.
          REPORT_ROOT=/tmp/quic-harness-jvm.log
          OK=$(grep -c 'harness OK' "$REPORT_ROOT" 2>/dev/null || true); OK=${OK:-0}
          SKIP=$(grep -c 'harness SKIP' "$REPORT_ROOT" 2>/dev/null || true); SKIP=${SKIP:-0}
          # Capture WHY each test skipped, not just the count, so a real
          # connection failure (vs an intentional gap) is legible without a log
          # dive. Dedup + count so a recurring failure shows as one line.
          SKIP_REASONS=$(grep -hoE 'harness SKIP: .+' "$REPORT_ROOT" 2>/dev/null \
            | sed -E 's/^harness SKIP: //' | sort | uniq -c | sed -E 's/^ *//' | sort -rn)
          echo "QuicHarnessIntegrationTests on Linux x64 JVM: OK=$OK, SKIP=$SKIP"
          [ -n "$SKIP_REASONS" ] && echo "Skip reasons:" && echo "$SKIP_REASONS"

          mkdir -p /tmp/quic-audit
          cat > /tmp/quic-audit/linux-jvm.txt <<EOF
          platform=linux-jvm
          launched=true
          ok=$OK
          skip=$SKIP
          EOF
          # Persist the distinct reasons as `reason=` lines so the cross-platform
          # summary job can render them without a log dive (the per-key greps
          # there are anchored, so extra lines are harmless).
          if [ -n "$SKIP_REASONS" ]; then
            while IFS= read -r line; do printf 'reason=%s\n' "$line"; done <<< "$SKIP_REASONS" \
              >> /tmp/quic-audit/linux-jvm.txt
          fi

          {
            echo "## QUIC harness — Linux x64 JVM"
            echo ""
            echo "| OK | SKIP |"
            echo "|---|---|"
            echo "| $OK | $SKIP |"
            if [ "$OK" = "0" ] && [ "$SKIP" != "0" ]; then
              echo ""
              echo "⚠️ Every QuicHarnessIntegrationTest skipped — Linux x64 JVM QUIC client not actually validated."
            fi
            if [ -n "$SKIP_REASONS" ]; then
              echo ""
              echo "<details><summary>Skip reasons (Linux x64 JVM)</summary>"
              echo ""
              echo '```'
              echo "$SKIP_REASONS"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$OK" = "0" ] && [ "$SKIP" != "0" ]; then
            echo "::warning::Every QuicHarnessIntegrationTest skipped on Linux x64 JVM"
          fi

      - name: Upload Linux x64 JVM QUIC audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quic-audit-linux-jvm
          path: /tmp/quic-audit/linux-jvm.txt
          retention-days: 1
          if-no-files-found: warn

      # Node/JS runs the SAME common QuicHarnessIntegrationTests (via the earlier
      # :socket-quic:jsNodeTest step), but QUIC isn't implemented on JS yet, so
      # every harness test self-skips with a "platform unsupported" marker —
      # intentional, like the Apple-simulator gate. Audit Node as its OWN matrix
      # lane and count those as intentional skips, so the interop summary renders
      # it "ℹ️ platform gap (known)". This is the fix for the false "all skipped":
      # the JS skips used to be swept into the JVM lane (the old audit grepped the
      # whole test-results tree) and failed the summary. jsNodeTest's results are
      # written before the JVM steps and never overwritten, so no snapshot needed.
      - name: Audit QUIC harness coverage on Node (JS)
        if: always()
        continue-on-error: true
        run: |
          REPORT_ROOT=socket-quic/build/test-results/jsNodeTest
          OK=$(grep -rh 'harness OK' "$REPORT_ROOT" 2>/dev/null | wc -l | tr -d ' ')
          SKIP=$(grep -rh 'harness SKIP' "$REPORT_ROOT" 2>/dev/null | wc -l | tr -d ' ')
          # Skips via the "platform unsupported" marker are the known JS gap, not
          # a regression — counted as intentional so the summary renders ℹ️.
          INTENTIONAL=$(grep -rh 'harness SKIP: platform unsupported' "$REPORT_ROOT" 2>/dev/null | wc -l | tr -d ' ')
          SKIP_REASONS=$(grep -rhoE 'harness SKIP: [^<&]+' "$REPORT_ROOT" 2>/dev/null \
            | sed -E 's/^harness SKIP: //' | sort | uniq -c | sed -E 's/^ *//' | sort -rn)
          echo "QuicHarnessIntegrationTests on Node (JS): OK=$OK, SKIP=$SKIP, INTENTIONAL=$INTENTIONAL"
          [ -n "$SKIP_REASONS" ] && echo "Skip reasons:" && echo "$SKIP_REASONS"

          mkdir -p /tmp/quic-audit
          cat > /tmp/quic-audit/js.txt <<EOF
          platform=js
          launched=true
          ok=$OK
          skip=$SKIP
          intentional_skip=$INTENTIONAL
          EOF
          if [ -n "$SKIP_REASONS" ]; then
            while IFS= read -r line; do printf 'reason=%s\n' "$line"; done <<< "$SKIP_REASONS" \
              >> /tmp/quic-audit/js.txt
          fi

          {
            echo "## QUIC harness — Node (JS)"
            echo ""
            echo "| OK | SKIP | INTENTIONAL |"
            echo "|---|---|---|"
            echo "| $OK | $SKIP | $INTENTIONAL |"
            if [ -n "$SKIP_REASONS" ]; then
              echo ""
              echo "<details><summary>Skip reasons (Node JS)</summary>"
              echo ""
              echo '```'
              echo "$SKIP_REASONS"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Node (JS) QUIC audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quic-audit-js
          path: /tmp/quic-audit/js.txt
          retention-days: 1
          if-no-files-found: warn

      - name: Run socket-quic-quiche native tests (quiche cinterop)
        run: >-
          ./gradlew :socket-quic-quiche:linuxX64Test
          --no-configuration-cache ${{ inputs.gradle-args }}

      - name: Build ARM64 test binaries
        run: >-
          ./gradlew linkDebugTestLinuxArm64
          :socket-quic-quiche:linkDebugTestLinuxArm64
          --no-configuration-cache ${{ inputs.gradle-args }}

      # Native-crash post-mortem: if the test worker dumped a core (the malloc-check
      # lane raises ulimit + core_pattern), load it in gdb and print every thread's
      # backtrace into the live log AND a file. With the JNI shim now built
      # frame-pointer-preserving and only `--strip-debug`'d (function symbols kept,
      # see socket-quic-quiche/build.gradle.kts), these stacks NAME the quiche_jni frames —
      # turning the intermittent SIGABRT from "exit 134" into a real native stack.
      - name: Native crash post-mortem (gdb backtrace from core)
        if: failure()
        run: |
          shopt -s nullglob
          cores=(/tmp/cores/core.*)
          if [ ${#cores[@]} -eq 0 ]; then
            echo "No core dumps captured — the run failed without a native abort (or core_pattern was overridden)."
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq gdb
          mkdir -p /tmp/cores/bt
          for core in "${cores[@]}"; do
            echo "==================== $core ===================="
            gdb --batch -q \
              -ex 'thread apply all bt full' \
              -ex 'info registers' \
              -ex quit \
              "$(command -v java)" "$core" 2>&1 | tee "/tmp/cores/bt/$(basename "$core").bt.txt"
          done

      # Test reports on failure — surfaces the full assertion message + stack
      # trace that gradle's brief CI log otherwise truncates to
      # `AssertionError at Assert.java:89`. Indispensable for diagnosing the
      # next harness flake without having to push a re-run with debug prints.
      # Also collect JVM fatal-error logs from a native crash (SIGABRT/SIGSEGV in quiche/JNI/FFM):
      # the test process writes hs_err_pid*/replay_pid* to its cwd, which the JUnit XML never
      # captures — without these a native abort is an invisible "exit 134". This is what lets us
      # diagnose the intermittent :socket-quic-quiche:jvmTest SIGABRT instead of guessing. The core dumps +
      # gdb backtraces + the symbol-bearing JNI shim let us reconstruct the crash fully offline.
      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-linux
          path: |
            build/reports/tests/
            build/test-results/
            socket-quic-quiche/build/reports/tests/
            socket-quic-quiche/build/test-results/
            **/hs_err_pid*.log
            **/replay_pid*.log
            /tmp/cores/core.*
            /tmp/cores/bt/*.txt
            socket-quic-quiche/libs/quiche/linux-x64/lib/libquiche_jni.so
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Android native libs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-native-libs
          path: |
            socket-quic-quiche/src/androidMain/jniLibs/
          retention-days: 1
          if-no-files-found: ignore

      # Symmetric to build-apple.yaml's quiche-macos-natives. The publish step
      # below uploads maven-local with the JAR but Gradle doesn't (currently)
      # stage native libs into META-INF/native/<platform>/ at publish time —
      # validate-artifacts.yaml injects them post-merge from this artifact.
      - name: Upload quiche Linux native libs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quiche-linux-natives
          path: socket-quic-quiche/libs/quiche/linux-*/lib/
          retention-days: 1
          if-no-files-found: ignore

      # The Windows x64 JNI shim is cross-compiled above (MinGW) but the
      # conformance suite runs on a separate windows-latest job (review.yaml's
      # build-windows). Hand the DLL across via this artifact so that job can
      # stage it and run :socket-quic-quiche:jvmTest. if-no-files-found: ignore keeps
      # the Linux job green if the cross-compile didn't produce the DLL.
      - name: Upload quiche Windows native lib
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quiche-windows-natives
          path: socket-quic-quiche/libs/quiche/windows-x64/lib/quiche_jni.dll
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload ARM64 test binaries
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64-test-binary
          path: |
            build/bin/linuxArm64/debugTest/test.kexe
            socket-quic-quiche/build/bin/linuxArm64/debugTest/test.kexe
          retention-days: 1

      # Upload the multi-arch quic-echo Docker context (jar + Dockerfile +
      # testcerts) so the Linux ARM64 (native) job can pull it down and
      # `docker compose up quic-echo` instead of skipping. The jar built
      # above contains both linux-x64 + linux-arm64 quiche natives, so the
      # same artifact runs under the arm64 manifest of the base image
      # without further fiddling. Phase 3 of the QUIC CI coverage plan.
      - name: Upload quic-echo Docker context
        uses: actions/upload-artifact@v7
        with:
          name: quic-echo-docker-context
          path: |
            test-harness/quic-echo/quic-echo.jar
            test-harness/quic-echo/Dockerfile
            test-harness/quic-echo/testcerts/
          retention-days: 1
          if-no-files-found: error

      - name: Publish to Maven Local
        run: ./gradlew publishToMavenLocal --no-configuration-cache ${{ inputs.gradle-args }}

      - name: Upload Maven local artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maven-local-linux
          path: ~/.m2/repository/com/ditchoom
          retention-days: 3

  test-arm64:
    name: "Linux ARM64 (native)"
    needs: build
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      # Checkout is needed for test-harness/ scripts + docker-compose.yml.
      # This job runs raw K/Native .kexe binaries and bypasses Gradle, so the
      # harnessUp/harnessDown Gradle tasks never fire. We bring the harness
      # up/down at the YAML level instead.
      - uses: actions/checkout@v6

      - name: Download ARM64 test binary
        uses: actions/download-artifact@v8
        with:
          name: linux-arm64-test-binary

      - name: Generate harness TLS certs
        run: bash test-harness/tls/gen-certs.sh

      # Linux trust-store injection covers the K/Native path too — BoringSSL
      # in the .kexe reads /etc/ssl/certs/ at runtime. No JVM keystore step is
      # needed for the .kexe (no JVM in this job).
      - name: Trust harness CA (Linux)
        run: |
          sudo cp test-harness/tls/certs/ca.crt /usr/local/share/ca-certificates/harness-root.crt
          sudo update-ca-certificates

      # Pull the multi-arch quic-echo Docker context produced by the
      # build-linux x64 job (Phase 2). Contains the fat jar with BOTH
      # linux-x64 + linux-arm64 quiche natives baked in, plus the
      # Dockerfile + testcerts/. The eclipse-temurin:21-jre-noble base
      # image is multi-arch on Docker Hub so the same artifact runs
      # under the arm64 manifest here without further fiddling.
      - name: Download quic-echo Docker context
        uses: actions/download-artifact@v8
        with:
          name: quic-echo-docker-context
          path: test-harness/quic-echo/

      # Restore execute bits if any (docker build doesn't need them but
      # the testcerts dir gets recreated as a normal dir, which is fine).
      - name: Verify quic-echo artifact
        run: |
          ls -la test-harness/quic-echo/
          test -f test-harness/quic-echo/quic-echo.jar
          test -f test-harness/quic-echo/Dockerfile
          test -f test-harness/quic-echo/testcerts/cert.crt
          test -f test-harness/quic-echo/testcerts/cert.key

      # quic-echo joins the rest of the harness services on ARM64 now
      # that the multi-arch jar is available. The K/N linuxArm64 test
      # binary already contains the quiche cinterop binding (built by
      # the x64 job's `linkDebugTestLinuxArm64` step and uploaded via
      # linux-arm64-test-binary), so QuicHarnessIntegrationTests
      # exercises the Linux ARM64 client against this server — closing
      # the last gap in the Linux QUIC matrix.
      - name: Bring up test harness (with quic-echo)
        run: bash test-harness/compose-up-retry.sh echo http tls toxiproxy netem-blackhole rst quic-echo

      - name: Run ARM64 tests (base module)
        run: |
          chmod +x build/bin/linuxArm64/debugTest/test.kexe
          ./build/bin/linuxArm64/debugTest/test.kexe

      - name: Run ARM64 tests (socket-quic-quiche)
        run: |
          if [ -f socket-quic-quiche/build/bin/linuxArm64/debugTest/test.kexe ]; then
            chmod +x socket-quic-quiche/build/bin/linuxArm64/debugTest/test.kexe
            # tee stdout into /tmp/socket-quic-arm64.log so the audit
            # step below can grep harness OK/SKIP markers from
            # QuicHarnessIntegrationTests.withHarness without re-running.
            ./socket-quic-quiche/build/bin/linuxArm64/debugTest/test.kexe 2>&1 | tee /tmp/socket-quic-arm64.log
          else
            echo "socket-quic ARM64 binary not found — skipping"
          fi

      # Audit step: counts QuicHarnessIntegrationTests OK vs SKIP from
      # the captured stdout above. Mirrors the macOS-side audit in
      # build-apple.yaml — surfaces a regression that silently breaks
      # the Linux ARM64 client (every test skips via the catch, suite
      # stays green) as a CI warning.
      - name: Audit QUIC harness coverage on Linux ARM64
        if: always()
        continue-on-error: true
        run: |
          LOG=/tmp/socket-quic-arm64.log
          OK=0
          SKIP=0
          SKIP_REASONS=""
          if [ -f "$LOG" ]; then
            OK=$(grep -c 'harness OK' "$LOG" || true)
            SKIP=$(grep -c 'harness SKIP' "$LOG" || true)
            # Distinct skip reasons (dedup + count) so a recurring failure is
            # one line. Source is the plain captured stdout, so grep the marker
            # straight through to end-of-line.
            SKIP_REASONS=$(grep -hoE 'harness SKIP: .+' "$LOG" 2>/dev/null \
              | sed -E 's/^harness SKIP: //' | sort | uniq -c | sed -E 's/^ *//' | sort -rn)
          fi
          echo "QuicHarnessIntegrationTests on linuxArm64: OK=$OK, SKIP=$SKIP"
          [ -n "$SKIP_REASONS" ] && echo "Skip reasons:" && echo "$SKIP_REASONS"

          mkdir -p /tmp/quic-audit
          cat > /tmp/quic-audit/linux-arm64.txt <<EOF
          platform=linux-arm64
          launched=true
          ok=$OK
          skip=$SKIP
          EOF
          if [ -n "$SKIP_REASONS" ]; then
            while IFS= read -r line; do printf 'reason=%s\n' "$line"; done <<< "$SKIP_REASONS" \
              >> /tmp/quic-audit/linux-arm64.txt
          fi

          {
            echo "## QUIC harness — Linux ARM64 (native)"
            echo ""
            echo "| OK | SKIP |"
            echo "|---|---|"
            echo "| $OK | $SKIP |"
            if [ "$OK" = "0" ] && [ "$SKIP" != "0" ]; then
              echo ""
              echo "⚠️ Every QuicHarnessIntegrationTest skipped — Linux ARM64 client not actually validated."
            fi
            if [ -n "$SKIP_REASONS" ]; then
              echo ""
              echo "<details><summary>Skip reasons (Linux ARM64)</summary>"
              echo ""
              echo '```'
              echo "$SKIP_REASONS"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$OK" = "0" ] && [ "$SKIP" != "0" ]; then
            echo "::warning::Every QuicHarnessIntegrationTest skipped on linuxArm64 — Linux ARM64 client not actually validated"
          fi

      - name: Upload Linux ARM64 QUIC audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quic-audit-linux-arm64
          path: /tmp/quic-audit/linux-arm64.txt
          retention-days: 1
          if-no-files-found: warn

      - name: Bring down test harness
        if: always()
        run: cd test-harness && docker compose down -v
