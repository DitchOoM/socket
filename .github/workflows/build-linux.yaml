name: "Build & Test (Linux)"

on:
  workflow_call:
    inputs:
      gradle-args:
        description: "Extra Gradle arguments (e.g., -PincrementMinor=true)"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "Computed next version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: "Linux / JVM / JS / Android"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-linux-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-linux-

      - name: Cache BoringSSL x64
        uses: actions/cache@v4
        with:
          path: libs/boringssl/linux-x64
          key: boringssl-linux-x64-v1-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache BoringSSL ARM64
        uses: actions/cache@v4
        with:
          path: libs/boringssl/linux-arm64
          key: boringssl-linux-arm64-v2-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache OpenSSL x64 (legacy fallback)
        uses: actions/cache@v4
        with:
          path: libs/openssl/linux-x64
          key: openssl-linux-x64-v5-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache OpenSSL ARM64 (legacy fallback)
        uses: actions/cache@v4
        with:
          path: libs/openssl/linux-arm64
          key: openssl-linux-arm64-v5-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache liburing x64
        uses: actions/cache@v4
        with:
          path: libs/liburing/linux-x64
          key: liburing-linux-x64-v1-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache liburing ARM64
        uses: actions/cache@v4
        with:
          path: libs/liburing/linux-arm64
          key: liburing-linux-arm64-v1-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl pkg-config cmake
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compile targets
        run: rustup target add aarch64-unknown-linux-gnu x86_64-pc-windows-gnu

      - name: Cache quiche Linux x64
        uses: actions/cache@v4
        with:
          path: socket-quic/libs/quiche/linux-x64
          key: quiche-linux-x64-v1-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache quiche Linux ARM64
        uses: actions/cache@v4
        with:
          path: socket-quic/libs/quiche/linux-arm64
          key: quiche-linux-arm64-v1-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache quiche static x64
        uses: actions/cache@v4
        with:
          path: socket-quic/libs/quiche/linux-x64
          key: quiche-static-linux-x64-v1-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Get version
        id: version
        run: echo "version=$(./gradlew -q nextVersion ${{ inputs.gradle-args }})" >> $GITHUB_OUTPUT

      - name: Build BoringSSL (shared with quiche)
        run: ./gradlew :buildBoringsslX64 :buildBoringsslArm64 --no-configuration-cache

      - name: Build quiche static lib (Linux x64, for K/Native)
        run: ./gradlew :socket-quic:buildQuicheStaticX64 --no-configuration-cache
        continue-on-error: true

      - name: Build quiche shared lib (Linux x64, for JVM)
        run: ./gradlew :socket-quic:buildQuicheSharedLinuxX64 --no-configuration-cache
        continue-on-error: true

      - name: Build quiche JNI for Windows x64 (cross-compile via MinGW)
        continue-on-error: true
        run: |
          cd socket-quic/build/quiche/quiche-*/ 2>/dev/null || exit 0
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc \
            cargo build --release --package quiche --target x86_64-pc-windows-gnu \
            --no-default-features --features ffi,boringssl-vendored || exit 0
          QUICHE_LIB=$(find target -path "*windows*release*" \( -name "libquiche.a" -o -name "quiche.lib" \) | head -1)
          if [ -n "$QUICHE_LIB" ]; then
            DEST=${{ github.workspace }}/socket-quic/src/jvmMain/resources/META-INF/native/windows-x64
            mkdir -p $DEST
            x86_64-w64-mingw32-gcc -shared -Wall \
              -o $DEST/quiche_jni.dll \
              ${{ github.workspace }}/socket-quic/src/jni/quiche_jni.c \
              -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux \
              -I ${{ github.workspace }}/socket-quic/libs/quiche/include \
              -Wl,--whole-archive $QUICHE_LIB -Wl,--no-whole-archive \
              -lws2_32 -lpthread -lm -lstdc++ \
              && x86_64-w64-mingw32-strip --strip-all $DEST/quiche_jni.dll \
              && echo "Built Windows x64: $(du -h $DEST/quiche_jni.dll | cut -f1)"
          fi

      - name: Run checks and tests
        run: >-
          ./gradlew :jvmTest :jsTest :linuxX64Test :testDebugUnitTest :ktlintCheck
          :socket-quic:jvmTest :socket-quic:linuxX64Test
          :socket-quic:ktlintCheck
          --no-configuration-cache ${{ inputs.gradle-args }}

      - name: Build ARM64 test binaries
        run: >-
          ./gradlew linkDebugTestLinuxArm64
          :socket-quic:linkDebugTestLinuxArm64
          --no-configuration-cache ${{ inputs.gradle-args }}

      - name: Upload ARM64 test binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-test-binary
          path: |
            build/bin/linuxArm64/debugTest/test.kexe
            socket-quic/build/bin/linuxArm64/debugTest/test.kexe
          retention-days: 1

      - name: Publish to Maven Local
        run: ./gradlew publishToMavenLocal --no-configuration-cache ${{ inputs.gradle-args }}

      - name: Upload Maven local artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-local-linux
          path: ~/.m2/repository/com/ditchoom
          retention-days: 3

  test-arm64:
    name: "Linux ARM64 (native)"
    needs: build
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - name: Download ARM64 test binary
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-test-binary

      - name: Run ARM64 tests (base module)
        run: |
          chmod +x build/bin/linuxArm64/debugTest/test.kexe
          ./build/bin/linuxArm64/debugTest/test.kexe

      - name: Run ARM64 tests (socket-quic)
        run: |
          if [ -f socket-quic/build/bin/linuxArm64/debugTest/test.kexe ]; then
            chmod +x socket-quic/build/bin/linuxArm64/debugTest/test.kexe
            ./socket-quic/build/bin/linuxArm64/debugTest/test.kexe
          else
            echo "socket-quic ARM64 binary not found — skipping"
          fi
