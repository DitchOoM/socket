name: "Build Test and Deploy"
on:
  pull_request_target:
    branches: [ main ]
    types:
      - closed
  workflow_dispatch:
    inputs:
      version-bump:
        description: "Version bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      flow:
        description: "Release flow"
        type: choice
        options:
          - release
          - draft
          - dry-run
        default: release

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  check-release:
    name: Check if release is needed
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      flow: ${{ steps.check.outputs.flow }}
      gradle-args: ${{ steps.check.outputs.gradle-args }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine release flow
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Manual dispatch has no PR to inspect — take flow and version
          # bump straight from the workflow inputs. Lets us recover from a
          # failed publish (e.g. transient Central API hiccup) without
          # opening a sham PR to flip the classifier.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.version-bump }}" in
              major) echo "gradle-args=-PincrementMajor=true" >> $GITHUB_OUTPUT ;;
              minor) echo "gradle-args=-PincrementMinor=true" >> $GITHUB_OUTPUT ;;
              *)     echo "gradle-args=" >> $GITHUB_OUTPUT ;;
            esac
            echo "flow=${{ inputs.flow }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          gradle_args=""
          if ${{ contains(github.event.pull_request.labels.*.name, 'major') }}; then
            gradle_args="-PincrementMajor=true"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}; then
            gradle_args="-PincrementMinor=true"
          fi
          echo "gradle-args=${gradle_args}" >> $GITHUB_OUTPUT

          # Check for skip-release label
          if ${{ contains(github.event.pull_request.labels.*.name, 'skip-release') }}; then
            echo "flow=dry-run" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for draft-release label
          if ${{ contains(github.event.pull_request.labels.*.name, 'draft-release') }}; then
            echo "flow=draft" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if only non-code files changed.
          # Use the paginated "list PR files" API rather than `gh pr diff`:
          # the latter hits the .diff endpoint, which GitHub caps at ~20k
          # lines / 300 files and returns HTTP 406 for larger PRs (this is
          # exactly what killed PR #48's deploy — the no-engine refactor
          # was +23,933 lines so the diff was rejected and the script
          # exited 1). The PR-files API returns objects with a `filename`
          # field and is paginated, so size-of-change doesn't matter.
          changed_files=$(gh api --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[].filename')
          for file in $changed_files; do
            case "$file" in
              .github/*|*.md|.gitignore|.editorconfig|CLAUDE.md|LICENSE|*.txt)
                ;;
              *)
                echo "Code file changed: $file"
                echo "flow=release" >> $GITHUB_OUTPUT
                exit 0
                ;;
            esac
          done

          echo "Only non-code files changed, skipping"
          echo "flow=skip" >> $GITHUB_OUTPUT

  build-linux:
    needs: check-release
    if: needs.check-release.outputs.flow != 'skip'
    uses: ./.github/workflows/build-linux.yaml
    with:
      gradle-args: ${{ needs.check-release.outputs.gradle-args }}

  build-apple:
    needs: check-release
    if: needs.check-release.outputs.flow != 'skip'
    uses: ./.github/workflows/build-apple.yaml
    with:
      gradle-args: ${{ needs.check-release.outputs.gradle-args }}

  validate:
    needs: [check-release, build-linux, build-apple]
    if: needs.check-release.outputs.flow != 'skip'
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}

  # Per-platform QUIC harness coverage matrix. Same job as the one in
  # review.yaml — gates the release on QUIC validity in addition to the
  # platform builds passing. See review.yaml for the design rationale.
  quic-interop-summary:
    name: "QUIC Interop Summary"
    needs: [check-release, build-linux, build-apple]
    if: needs.check-release.outputs.flow != 'skip'
    runs-on: ubuntu-latest
    steps:
      - name: Download all QUIC audit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: quic-audit-*
          path: /tmp/quic-audit
          merge-multiple: true
          # See review.yaml: `warn` (not the v8 default `error`) so a digest check on the tiny audit
          # files doesn't abort the download and red the summary on every merge.
          digest-mismatch: warn
        continue-on-error: true

      - name: Build interop matrix
        run: |
          shopt -s nullglob
          FILES=(/tmp/quic-audit/*.txt)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No QUIC audit artifacts found"
            {
              echo "## QUIC Interop Summary"
              echo ""
              echo "_No audit artifacts uploaded by any platform job._"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## QUIC Interop Summary"
            echo ""
            echo "| Platform | OK | SKIP | Status |"
            echo "|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          # Buffer reason <details> blocks and flush AFTER the table — emitting
          # them inside the loop would split the markdown table.
          REASONS_OUT=$(mktemp)
          for f in "${FILES[@]}"; do
            platform=$(grep '^platform=' "$f" | cut -d= -f2)
            launched=$(grep '^launched=' "$f" | cut -d= -f2)
            applicable=$(grep '^applicable=' "$f" | cut -d= -f2)
            ok=$(grep '^ok=' "$f" | cut -d= -f2)
            skip=$(grep '^skip=' "$f" | cut -d= -f2)
            intentional_skip=$(grep '^intentional_skip=' "$f" | cut -d= -f2)
            reasons=$(grep '^reason=' "$f" | cut -d= -f2-)
            launched=${launched:-unknown}
            # applicable defaults true for older audit files that predate the field.
            applicable=${applicable:-true}
            ok=${ok:-0}
            skip=${skip:-0}
            intentional_skip=${intentional_skip:-0}

            if [ "$ok" -gt 0 ]; then
              status="✅ exercised"
            elif [ "$applicable" = "false" ]; then
              # The quiche QuicHarnessIntegrationTests doesn't run on this lane at all
              # (JS has no QUIC implementation; an Apple NW-only lane has no quiche target).
              # `ok=0,skip=0` is structural, not a silently all-skipped regression — that
              # platform's QUIC client (if any) is validated elsewhere. Render ℹ️, never fail.
              # NOTE: this branch must mirror review.yaml's copy of the same job — the two
              # had drifted (merged.yaml lacked it), reddening every release on the JS lane.
              status="ℹ️ platform gap (known)"
            elif [ "$skip" -gt 0 ] && [ "$intentional_skip" = "$skip" ]; then
              status="ℹ️ platform gap (known)"
            elif [ "$skip" -gt 0 ]; then
              status="❌ all skipped"
              FAILED=1
            elif [ "$launched" = "true" ]; then
              status="❌ no markers despite launch"
              FAILED=1
            else
              status="ℹ️ no data"
            fi

            echo "| $platform | $ok | $skip | $status |" >> "$GITHUB_STEP_SUMMARY"
            echo "platform=$platform launched=$launched applicable=$applicable ok=$ok skip=$skip intentional=$intentional_skip status=$status"

            if [ -n "$reasons" ] && { [ "$skip" -gt 0 ] || [ "$applicable" = "false" ]; }; then
              if [ "$applicable" = "false" ]; then
                detail="$platform — not applicable (known gap)"
              else
                detail="$platform — skip reasons ($skip skipped)"
              fi
              {
                echo ""
                echo "<details><summary>$detail</summary>"
                echo ""
                echo '```'
                echo "$reasons"
                echo '```'
                echo "</details>"
              } >> "$REASONS_OUT"
            fi
          done

          cat "$REASONS_OUT" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "1" ]; then
            echo "::error::QUIC interop matrix failed — at least one platform's harness coverage broke"
            exit 1
          fi

  publish:
    needs: [check-release, validate]
    if: needs.check-release.outputs.flow == 'draft' || needs.check-release.outputs.flow == 'release'
    uses: ./.github/workflows/publish-to-central.yaml
    with:
      publishing-type: ${{ needs.check-release.outputs.flow == 'draft' && 'USER_MANAGED' || 'AUTOMATIC' }}
      version: ${{ needs.build-linux.outputs.version }}
    secrets:
      GPG_KEY_CONTENTS: ${{ secrets.GPG_KEY_CONTENTS }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

  finalize:
    name: Finalize Release
    needs: [check-release, build-linux, publish]
    if: always() && needs.check-release.outputs.flow != 'skip' && needs.check-release.outputs.flow != 'dry-run'
    runs-on: ubuntu-latest
    steps:
      # Checkout with RELEASE_PAT (workflow scope) so the tag push in
      # "Create tag and GitHub release" can succeed when the release commit's
      # tree contains .github/workflows/* changes. Default GITHUB_TOKEN lacks
      # the workflow scope and silently rejects such tag pushes (v3.1.0/v3.1.1
      # both failed this way and were backfilled manually).
      # Falls back to GITHUB_TOKEN if RELEASE_PAT is not configured.
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Create draft GitHub release
        if: needs.check-release.outputs.flow == 'draft' && needs.publish.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual release' }}
          PR_URL: ${{ github.event.pull_request.html_url || format('{0}/{1}', github.server_url, github.repository) }}
        run: |
          version="${{ needs.build-linux.outputs.version }}"
          deployment_id="${{ needs.publish.outputs.deployment-id }}"
          staging_url="https://central.sonatype.com/publishing/deployments"

          gh release create "v${version}" \
              --draft \
              --repo="$GITHUB_REPOSITORY" \
              --title="v${version}" \
              --notes="$(cat <<EOF
          ## [${PR_TITLE}](${PR_URL})

          **Status:** Awaiting validation in [Maven Central Staging](${staging_url})
          **Deployment ID:** \`${deployment_id}\`

          ### To complete release:
          1. Validate artifacts in Maven Central staging area
          2. Run the 'Complete or Cancel Release' workflow with action 'complete' and version '${version}'

          ### To cancel:
          1. Run the 'Complete or Cancel Release' workflow with action 'cancel' and version '${version}'
          2. This will drop the deployment and delete this draft release
          EOF
          )"

      - name: Create tag and GitHub release
        if: needs.check-release.outputs.flow == 'release' && needs.publish.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual release' }}
          PR_URL: ${{ github.event.pull_request.html_url || format('{0}/{1}', github.server_url, github.repository) }}
        run: |
          version="${{ needs.build-linux.outputs.version }}"
          tag="v${version}"

          # Check if tag already exists
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping"
            exit 0
          fi

          # Create and push tag
          git tag "$tag"
          git push origin "$tag"

          # Create release
          maven_url="https://central.sonatype.com/artifact/com.ditchoom/socket/${version}"
          gh release create "$tag" \
              --repo="$GITHUB_REPOSITORY" \
              --title="${tag}" \
              --notes="$(cat <<EOF
          ## [${PR_TITLE}](${PR_URL})

          **Maven Central:** [com.ditchoom:socket:${version}](${maven_url})
          EOF
          )"
